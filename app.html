<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CoiffPro - Gestion Salon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--gold:#c44c7a;--gold-light:#d4689a;--gold-bg:rgba(196,76,122,.1);--gold-bg2:rgba(196,76,122,.18);
--bg:#f8f6f3;--white:#fff;--text:#fff;--text2:rgba(255,255,255,.75);--text3:rgba(255,255,255,.5);--border:#e0dcd6;--border2:#eae6e0;
--green:#2d9a5e;--green-bg:#e6f7ee;--orange:#d48a1a;--orange-bg:#fdf2e4;--red:#c43838;--red-bg:#fde8e8;
--blue:#4a85b5;--blue-bg:#e8f1fa;--purple:#8050a8;--purple-bg:#f3ecfa;--pink:#c44c7a;--pink-bg:#fce4ee;
--accent:var(--gold);--accent2:#d4b95e;--accent-bg:var(--gold-bg);
--f1:'Playfair Display',serif;--f2:'Nunito',sans-serif;
--sh:0 2px 8px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.1);--r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:transparent;color:var(--text);font-family:var(--f2);min-height:100vh;font-size:15px;padding-bottom:40px;}
.app-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:1;}
button{font-family:var(--f2);cursor:pointer;border:none;}
input,select{background:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.3);color:#1a1a1a;padding:12px 16px;border-radius:10px;font-family:var(--f2);font-size:15px;outline:none;width:100%;}
input:focus,select:focus{border-color:var(--gold);}

.header{background:rgba(0,0,0,.75);border-bottom:none;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.header img{height:44px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.header h1{font-family:var(--f1);font-size:18px;font-weight:700;flex:1;color:#fff;}
.header small{font-size:13px;color:var(--gold);display:block;font-weight:600;}
.back-btn{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(255,255,255,.2);color:#fff;}

#app{padding:16px;}
.sec{font-family:var(--f1);font-size:20px;font-weight:900;margin:20px 0 12px;padding-left:4px;color:#fff;text-shadow:0 2px 8px #000,0 0 20px rgba(0,0,0,.5);}
.sec:first-child{margin-top:8px;}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.tile{background:rgba(20,20,20,.88);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:16px 8px;text-align:center;box-shadow:var(--sh);cursor:pointer;}
.tile:active{transform:scale(.96);}
.tile .ti{width:52px;height:52px;border-radius:14px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,.85)!important;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.tile .tl{font-size:14px;font-weight:900;line-height:1.3;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.9);}

.card{background:rgba(20,20,20,.85);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;}
.ct{font-family:var(--f1);font-size:16px;font-weight:700;color:#fff;margin-bottom:12px;}

.sr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sb{background:rgba(20,20,20,.88);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh);}
.sb .sv{font-size:24px;font-weight:800;font-family:var(--f1);color:#fff;}
.sb .sl{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;margin-top:2px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:10px;font-size:15px;font-weight:700;background:rgba(20,20,20,.85);color:#fff;border:1px solid rgba(255,255,255,.15);}
.btn:active{transform:scale(.97);}
.bg{background:var(--gold);color:#fff;border:none;box-shadow:0 2px 10px rgba(184,150,15,.35);}
.bs{padding:7px 12px;font-size:12px;}
.bk{width:100%;justify-content:center;padding:14px;font-size:16px;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;}
.b1{background:var(--green-bg);color:var(--green);}
.b2{background:var(--orange-bg);color:var(--orange);}
.b3{background:var(--red-bg);color:var(--red);}
.b4{background:var(--blue-bg);color:var(--blue);}

.li{display:flex;align-items:center;gap:10px;padding:11px;border-radius:10px;background:rgba(20,20,20,.85);border:1px solid rgba(255,255,255,.1);margin-bottom:5px;}
.li:active{background:var(--border2);}
.li .lb{width:3px;height:30px;border-radius:2px;flex-shrink:0;}
.li .ln{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
.li .ls{font-size:13px;color:rgba(255,255,255,.6);margin-top:1px;}
.li .lp{font-weight:800;color:var(--gold);font-family:var(--f1);font-size:15px;flex-shrink:0;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;background:rgba(20,20,20,.85);color:#fff;border:1px solid rgba(255,255,255,.1);white-space:nowrap;flex-shrink:0;}
.tab.on{background:var(--gold);color:#fff;border-color:var(--gold);}

.cnav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.cnav h3{flex:1;text-align:center;font-family:var(--f1);font-size:18px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.cnav button{width:40px;height:40px;border-radius:10px;background:rgba(20,20,20,.85);border:1px solid rgba(255,255,255,.1);font-size:18px;display:flex;align-items:center;justify-content:center;color:#fff;}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.mbox{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;max-height:85vh;overflow:auto;color:#1a1a2e!important;--text:#1a1a2e;--text2:#444;--text3:#666;--border2:rgba(0,0,0,.1);--border:rgba(0,0,0,.08);--bg:rgba(0,0,0,.04);--bg2:rgba(0,0,0,.03);--sh:none;--sh2:0 2px 8px rgba(0,0,0,.1);}
.mbox,.mbox *{color:#1a1a2e;}
.mbox h2{font-family:var(--f1);font-size:20px;color:var(--gold)!important;margin-bottom:16px;}
.mbox .btn{color:#fff!important;background:rgba(30,30,30,.7)!important;border-color:rgba(0,0,0,.2)!important;}
.mbox .btn.bg{background:var(--gold)!important;color:#fff!important;border:none!important;}
.mbox .btn.bs{color:#333!important;background:rgba(0,0,0,.06)!important;border-color:rgba(0,0,0,.15)!important;}
.mbox input,.mbox select,.mbox textarea{color:#1a1a2e!important;background:rgba(0,0,0,.04)!important;border-color:rgba(0,0,0,.18)!important;}
.mbox label{color:#444!important;text-shadow:none!important;}
.mbox .badge{color:#fff!important;}
.mbox .fg label{color:#444!important;text-shadow:none!important;}
.mbox .card{background:rgba(0,0,0,.03)!important;border-color:rgba(0,0,0,.1)!important;}
.mbox .sec{color:#1a1a2e!important;text-shadow:none!important;}
.mbox .ct{color:#333!important;}
.mbox table{color:#1a1a2e!important;}
.mbox th{color:#555!important;background:rgba(0,0,0,.04)!important;border-color:rgba(0,0,0,.1)!important;}
.mbox td{color:#1a1a2e!important;border-color:rgba(0,0,0,.08)!important;}
.mbox svg text{fill:#1a1a2e!important;}

.mbox .li{background:rgba(0,0,0,.04)!important;border:1px solid rgba(0,0,0,.1)!important;color:#1a1a2e!important;transition:background .15s;}
.mbox .li:active,.mbox .li:hover{background:rgba(0,0,0,.1)!important;}
.mbox .li .ln{color:#1a1a2e!important;}
.mbox .li .ls{color:#666!important;}
.mbox .li .lp{color:var(--gold)!important;}

.mbox .sb{background:rgba(0,0,0,.04)!important;border-color:rgba(0,0,0,.1)!important;}
.mbox .sb .sv{color:#1a1a2e!important;}
.mbox .sb .sl{color:#666!important;}
.fg{margin-bottom:12px;}
.fg label{font-size:13px;color:#fff;margin-bottom:4px;display:block;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.5);}

.pause-tag{background:var(--orange-bg);color:var(--orange);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;display:inline-block;margin-top:2px;}

.chart{display:flex;align-items:flex-end;gap:5px;height:110px;}
.chart>div{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
.chart .cv{font-size:9px;color:var(--gold);font-weight:700;margin-bottom:2px;}
.chart .cb{width:100%;border-radius:4px 4px 1px 1px;background:linear-gradient(to top,var(--gold),var(--gold-light));min-height:3px;}
.chart .cl{font-size:9px;color:var(--text3);margin-top:4px;}

.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;font-family:var(--f1);color:#fff;margin:0 auto 8px;}

@media(min-width:768px){
body{max-width:100%;margin:0 auto;}
.tiles{grid-template-columns:repeat(4,1fr);}
.sr{grid-template-columns:repeat(4,1fr);}
.mbox{border-radius:20px;margin-bottom:20px;}
.mbg{align-items:center;}
}

/* === GRID PLANNING === */
.pg-wrap{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.1);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto;}
.pg-grid{display:flex;min-width:360px;}
.pg-timecol{flex:0 0 50px;background:rgba(245,245,245,.9);border-right:1px solid #ddd;}
.pg-col{flex:1;border-left:1px solid var(--border);position:relative;}
.pg-colhead{padding:8px 4px;text-align:center;font-family:var(--f1);font-size:14px;font-weight:700;background:rgba(255,255,255,.6);border-bottom:2px solid #ccc;color:#1a1a1a;height:75px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.pg-colhead .hdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.pg-blocked{position:absolute;left:2px;right:2px;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(196,56,56,.08) 4px,rgba(196,56,56,.08) 8px);border:1px dashed rgba(196,56,56,.3);border-radius:6px;z-index:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--red);font-weight:600;pointer-events:none;}
.pg-timehead{padding:0 4px;text-align:center;font-size:12px;color:#666;font-weight:600;background:rgba(245,245,245,.9);border-bottom:2px solid #ccc;height:75px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
.pg-slots{position:relative;}
.pg-tslot{height:28px;font-size:12px;color:#666;font-weight:800;text-align:right;padding:2px 6px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;justify-content:flex-end;}
.pg-tslot.hr{border-top:2px solid #999;border-bottom:1px solid #f0f0f0;font-weight:800;color:#333;}
.pg-slot{height:28px;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.pg-slot.hr{border-top:2px solid #999;border-bottom:1px solid #f0f0f0;}
.pg-slot:hover{background:rgba(196,76,122,.08);}
.pg-block{position:absolute;border-radius:6px;padding:3px 6px;font-size:11px;line-height:1.25;overflow:hidden;z-index:5;cursor:pointer;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.pg-block{box-sizing:border-box;padding-left:7px;padding-right:3px;}
.pg-block .pb-name{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pg-block .pb-svc{font-size:11px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pg-block .pb-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:800;margin-top:1px;}
.pg-block .pb-time{font-size:10px;opacity:.7;}
.pg-pause{position:absolute;box-sizing:border-box;border-radius:4px;background:var(--orange-bg);border:1px dashed var(--orange);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--orange);font-weight:700;z-index:4;}
.pg-reprise{position:absolute;left:3px;right:3px;border-radius:6px;padding:2px 6px;font-size:10px;line-height:1.2;overflow:hidden;z-index:5;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.pg-reprise .pr-label{font-weight:700;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pg-reprise .pr-note{font-size:9px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}
.pg-absent{position:absolute;left:0;right:0;top:0;bottom:0;background:rgba(245,242,235,.85);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);font-weight:700;font-style:italic;z-index:3;}
.pg-summary{display:flex;gap:8px;margin-top:12px;}
.pg-summary .ps-card{flex:1;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.08);border-radius:var(--r);padding:10px;text-align:center;box-shadow:var(--sh);}
.pg-summary .ps-name{font-family:var(--f1);font-weight:700;font-size:13px;}
.pg-summary .ps-info{font-size:11px;color:var(--text2);margin-top:2px;}
.pg-summary .ps-ca{font-family:var(--f1);font-weight:800;color:var(--gold);font-size:16px;margin-top:4px;}


/* DRAG & DROP */
.pg-block.dragging{opacity:.4;z-index:1!important;}
.pg-ghost{position:fixed;z-index:999;pointer-events:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.25);border-left:4px solid;opacity:.92;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pg-dropline{position:absolute;left:0;right:0;height:3px;background:var(--gold);z-index:10;pointer-events:none;border-radius:2px;box-shadow:0 0 6px var(--gold);}
.pg-slot:hover{background:rgba(196,76,122,.08);}

.caisse-menu{position:fixed;z-index:200;background:rgba(40,40,40,.95);border-radius:12px;padding:6px 0;box-shadow:0 8px 30px rgba(0,0,0,.4);min-width:200px;backdrop-filter:blur(10px);}
.caisse-menu div{padding:14px 20px;color:#fff;font-size:14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.1);}
.caisse-menu div:last-child{border-bottom:none;}
.caisse-menu div:active{background:rgba(255,255,255,.1);}
.caisse-menu .cm-accent{color:var(--pink);font-weight:700;}

@media print{.header,.back-btn,.btn,.tabs,.cnav,.tile,.sec,.sr{display:none!important;}body{background:#fff!important;padding:0!important;}}

/* DRAG & DROP */
.pg-now-line{position:absolute;left:0;right:0;height:2px;background:#4a90d9;z-index:8;pointer-events:none;box-shadow:0 0 8px rgba(74,144,217,.5);}
.pg-now-line::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;background:#4a90d9;border-radius:50%;}

.pg-slot{position:relative;}
.pg-slot::after{content:attr(data-time);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:rgba(0,0,0,.2);font-weight:600;opacity:0;transition:opacity .15s;pointer-events:none;}
.pg-slot:hover::after{opacity:1;color:rgba(0,0,0,.4);}

.online-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 6px;border-radius:6px;background:#c8a84e;color:#0a0a0a;margin-left:4px;vertical-align:middle}
</style>
</head>

SALON_CONFIG.adresseComplete=function(){return this.adresse+(this.cp?", "+this.cp:"")+(this.ville?" "+this.ville:"");};
document.addEventListener("DOMContentLoaded",function(){var el=document.getElementById("salonName");if(el)el.textContent=SALON_CONFIG.nom;});

var T=[
  {id:1,n:"Coiffeur 1",i:"C1",c:"#c9a227",img:"",
   hrs:{0:null,1:{o:"14:00",c:"18:00"},2:{o:"09:00",c:"18:00"},3:{o:"09:00",c:"18:00"},4:{o:"09:00",c:"18:00"},5:{o:"09:00",c:"18:00"},6:{o:"09:00",c:"16:00"}}

function addNotif(type,title,detail,data){
  if(!window.NOTIFS)window.NOTIFS=[];
  window.NOTIFS.unshift({id:U(),ts:new Date().toISOString(),type:type,title:title,detail:detail,data:data||null,seen:false,confirmed:false});
}
function showNotifs(){
  // Inject RDV online as notifications
  if(!window.NOTIFS)window.NOTIFS=[];
  var now48=new Date().getTime()-48*3600000;// 48h ago
  if(window.RDV_ONLINE){
    window.RDV_ONLINE.forEach(function(r){
      // Skip done RDV entirely (they've been acknowledged)
      if(r.status==="done")return;
      var exists=false;
      for(var i=0;i<window.NOTIFS.length;i++){if(window.NOTIFS[i].rdvOnlineId===r.id){exists=true;break;}}
      if(window._dismissedNotifs&&window._dismissedNotifs[r.id])exists=true;
      if(!exists){
        window.NOTIFS.unshift({
          id:"ro_"+r.id,rdvOnlineId:r.id,type:"rdv_online",
          title:"\ud83d\udcc5 RDV en ligne"+(r.status==="pending"?" (en attente)":r.status==="confirmed"?" (confirm\u00e9)":" (termin\u00e9)"),
          detail:r.nom+(r.prenom?" "+r.prenom:"")+" \u2022 "+r.svcNom+" \u2022 "+r.date+" "+r.heure+(r.tel?" \u2022 "+r.tel:"")+(r.message?" \u2022 "+r.message:""),
          ts:r.createdAt||new Date().toISOString(),
          seen:false,
          confirmed:r.status==="done",
          onlineRdv:r
        });
      }
    });
  }
  // Clean old read notifications (>48h and seen)
  window.NOTIFS=window.NOTIFS.filter(function(n){
    if(n.seen&&n.confirmed&&n.ts){return new Date(n.ts).getTime()>now48;}
    return true;
  });
  var notifs=window.NOTIFS||[];
  var h='<div class="mbg" onclick="cM()"><div class="mbox" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto">';
  h+='<h2>\ud83d\udd14 Notifications</h2>';
  if(!notifs.length){h+='<div style="padding:30px;text-align:center;color:var(--text3)"><div style="font-size:36px;margin-bottom:8px">\u2705</div>Aucune notification</div>';}
  else{
    var unr=notifs.filter(function(n){return!n.seen;});
    if(unr.length>0){h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:var(--red)">'+unr.length+' non lue'+(unr.length>1?'s':'')+'</span><button class="btn bs" style="font-size:12px" onclick="markAllNotifsRead()">Tout effacer</button></div>';}
    for(var i=0;i<Math.min(notifs.length,30);i++){
      var n=notifs[i];
      var icon=n.type==="rdv_online"?"\ud83d\udcc5":n.type==="produit_online"?"\ud83d\uded2":n.type==="google_reserve"?"\ud83c\udf10":"\ud83d\udd14";
      var bgS=n.seen?"":"background:var(--gold-bg);";
      h+='<div style="display:flex;gap:10px;padding:12px;border-bottom:1px solid var(--border2);'+bgS+'border-radius:8px;margin-bottom:4px">';
      h+='<div style="font-size:22px;flex-shrink:0">'+icon+'</div>';
      h+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">'+n.title+'</div>';
      h+='<div style="font-size:13px;color:var(--text2);margin-top:2px">'+n.detail+'</div>';
      h+='<div style="font-size:11px;color:var(--text3);margin-top:4px">'+n.ts.slice(0,16).replace("T"," ")+'</div></div>';
      h+='<div style="flex-shrink:0">';
      if(!n.confirmed)h+='<button class="btn bg bs" style="font-size:11px;padding:4px 10px" onclick="confirmNotif(\''+n.id+'\')">\u2714 Vu</button>';
      else h+='<span style="font-size:11px;color:var(--green);font-weight:600">\u2714 Confirm\u00e9</span>';
      h+='</div></div>';
    }
  }
  h+='<div style="display:flex;gap:8px;margin-top:14px">';
  h+='<button class="btn bk" style="flex:1" onclick="cM()">Fermer</button>';
  if(notifs.some(function(n){return n.seen&&n.confirmed;}))h+='<button class="btn bs" style="font-size:12px" onclick="clearReadNotifs()">Effacer les lues</button>';
  h+='</div></div></div>';
  notifs.forEach(function(n){n.seen=true;});
  document.getElementById("modal").innerHTML=h;
}
function confirmNotif(id){
  if(!window.NOTIFS)return;
  for(var i=0;i<window.NOTIFS.length;i++){
    if(window.NOTIFS[i].id===id){
      window.NOTIFS[i].confirmed=true;window.NOTIFS[i].seen=true;
      // If it's an online RDV, confirm it in Supabase
      if(window.NOTIFS[i].rdvOnlineId){
        var rdvId=window.NOTIFS[i].rdvOnlineId;
        if(typeof updateRdvOnline==="function")updateRdvOnline(rdvId,"confirmed");
        // Update local state
        if(window.RDV_ONLINE){
          for(var j=0;j<window.RDV_ONLINE.length;j++){
            if(window.RDV_ONLINE[j].id===rdvId){window.RDV_ONLINE[j].status="confirmed";break;}
          }
        }
        window.NOTIFS[i].title="\ud83d\udcc5 RDV en ligne (confirm\u00e9)";
      }
      break;
    }
  }
  showNotifs();
  updateNotifBadge();
}
function saveDismissed(){try{sessionStorage.setItem("_dismissed",JSON.stringify(window._dismissedNotifs||{}));}catch(e){}}
function loadDismissed(){try{var d=sessionStorage.getItem("_dismissed");if(d)window._dismissedNotifs=JSON.parse(d);}catch(e){}}
loadDismissed();

function clearReadNotifs(){
  if(!window.NOTIFS)return;
  if(!window._dismissedNotifs)window._dismissedNotifs={};
  window.NOTIFS.forEach(function(n){
    if(n.seen&&n.rdvOnlineId){
      window._dismissedNotifs[n.rdvOnlineId]=true;
      // Mark as seen in Supabase so it doesn't come back after page reload
      if(typeof _sb!=="undefined"&&_sb)_sb.from("rdv_online").update({status:"done"}).eq("id",n.rdvOnlineId);
    }
  });
  window.NOTIFS=window.NOTIFS.filter(function(n){return!n.seen;});
  saveDismissed();showNotifs();updateNotifBadge();
}
function markAllNotifsRead(){
  if(!window.NOTIFS)return;
  if(!window._dismissedNotifs)window._dismissedNotifs={};
  window.NOTIFS.forEach(function(n){
    n.seen=true;n.confirmed=true;
    if(n.rdvOnlineId){
      window._dismissedNotifs[n.rdvOnlineId]=true;
      if(typeof _sb!=="undefined"&&_sb)_sb.from("rdv_online").update({status:"done"}).eq("id",n.rdvOnlineId);
    }
  });
  window.NOTIFS=[];
  saveDismissed();updateNotifBadge();showNotifs();
}

  var cols=["#c44c7a","#4a85b5","#2d9a5e","#d48a1a","#8050a8"];

  var newC={id:0,n:n,i:ini,c:cols[T.length%cols.length],img:"",hrs:defHrs};

  if(typeof _sb!=="undefined"&&_sb&&typeof _salonId!=="undefined"&&_salonId){
    _sb.from("collaborateurs").insert({salon_id:_salonId,nom:n,initiales:ini,couleur:newC.c,img:"",horaires:defHrs}).select().then(function(r){

function cStats(){
  var dn=AP.filter(function(a){return a.st==="done"});
  var tA=AP.filter(function(a){return a.date===TD&&a.st!=="canc"});
  var cm=0;dn.forEach(function(a){if(a.date.indexOf(TD.slice(0,7))===0)cm+=a.pr;});
  PS.forEach(function(p){if(p.date.indexOf(TD.slice(0,7))===0)cm+=p.pr;});
  var ct=0;dn.forEach(function(a){ct+=a.pr;});
  var fi=0,pe=0,ri=0;
  var cs=CL.map(function(c){
    var v=dn.filter(function(a){return a.cId===c.id}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var l=v.length>0?v[0].date:null;
    var d=l?dB(l,TD):9999;
    var s="fidele";
    if(d>135){s="perdu";pe++;}else if(d>90){s="risque";ri++;}else fi++;
    return{id:c.id,nom:c.nom,pre:c.pre,ph:c.ph,em:c.em,no:c.no,cr:c.cr,vc:v.length,last:l,days:d,status:s};
  });
  var tx=CL.length?Math.round(fi/CL.length*100):0;
  var mo=[];var now=new Date(TD);
  for(var i=5;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);var k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");var tot=0;dn.forEach(function(a){if(a.date.indexOf(k)===0)tot+=a.pr;});mo.push({k:k,l:MO[d.getMonth()].slice(0,3),t:tot});}
  return{tot:CL.length,tA:tA.length,cm:cm,ct:ct,fi:fi,pe:pe,ri:ri,tx:tx,cs:cs,mo:mo};
}

var ABSENCES=[];
var APP_BG="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=800&q=80";
var SLOT=15,SLOT_H=28;

// Get total duration of a service (sum of all phases)
function svcTotalDur(sv){if(!sv||!sv.phases)return 30;var t=0;sv.phases.forEach(function(p){t+=p.d;});return t;}
// Get work-only phases with absolute time offsets for an appointment
function getWorkBlocks(a){
  var sv=gS(a.sId);var phases=a.aPhases||(sv?sv.phases:null);
  if(!phases||!phases.length)return[{start:toM(a.time),end:toM(a.time)+30,a:a}];
  var startM=toM(a.time),cur=startM,blocks=[];
  phases.forEach(function(ph){
    if(ph.t==="w"){blocks.push({start:cur,end:cur+ph.d,a:a,label:ph.l});}
    cur+=ph.d;
  });
  return blocks;
}

// Check if stylist is working on a given day/time
function isStylistAvailable(stId, date, timeStr){
  var sty=gT(stId);if(!sty)return false;
  var d=new Date(date);var dow=d.getDay();
  // Check individual hours
  var hrs=sty.hrs?sty.hrs[dow]:H[dow];
  if(!hrs)return false; // day off
  var m=toM(timeStr);
  if(m<toM(hrs.o)||m>=toM(hrs.c))return false; // outside hours
  // Check absences
  if(window.ABSENCES){
    for(var i=0;i<window.ABSENCES.length;i++){
      var ab=window.ABSENCES[i];
      if(ab.stId!==stId)continue;
      if(ab.type==="conge"||ab.type==="absent_jour"){
        if(ab.dateFrom<=date&&ab.dateTo>=date)return false;
      }else if(ab.type==="absent_heures"||ab.type==="pause"){
        if(ab.date===date&&m>=toM(ab.from)&&m<toM(ab.to))return false;
      }
    }
  }
  return true;
}

// Get blocked slots for a stylist on a day (returns array of {from,to,label,type})
function getBlockedSlots(stId, date){
  var sty=gT(stId);if(!sty)return[];
  var d=new Date(date);var dow=d.getDay();
  var hrs=sty.hrs?sty.hrs[dow]:H[dow];
  var blocks=[];
  if(!hrs){blocks.push({from:"00:00",to:"23:59",label:"Jour de repos",type:"repos"});return blocks;}
  // Check absences
  if(window.ABSENCES){
    for(var i=0;i<window.ABSENCES.length;i++){
      var ab=window.ABSENCES[i];
      if(ab.stId!==stId)continue;
      if(ab.type==="conge"&&ab.dateFrom<=date&&ab.dateTo>=date){
        blocks.push({from:hrs.o,to:hrs.c,label:"Cong\u00e9",type:"conge"});
      }else if(ab.type==="absent_jour"&&ab.dateFrom<=date&&ab.dateTo>=date){
        blocks.push({from:hrs.o,to:hrs.c,label:ab.motif||"Absent(e)",type:"absent"});
      }else if((ab.type==="absent_heures"||ab.type==="pause")&&ab.date===date){
        blocks.push({from:ab.from,to:ab.to,label:ab.motif||(ab.type==="pause"?"Pause":"Absent(e)"),type:ab.type});
      }
    }
  }
  return blocks;
}

// Check if a new RDV conflicts with existing ones (work blocks only, pauses ignored)
function checkConflict(stId, date, time, svcId, excludeId){
  // First check if stylist is available at all
  if(!isStylistAvailable(stId, date, time)){
    return [{appt:null,clientName:"INDISPONIBLE",svcName:gT(stId)?gT(stId).n+" indisponible":"Indisponible",time:time,overlapStart:toM(time),overlapEnd:toM(time)+30}];
  }
  var sv=gS(svcId);
  var fakeAppt={sId:svcId,time:time,stId:stId};
  var newBlocks=getWorkBlocks(fakeAppt);
  // Get all existing appts for this stylist on this date
  var existing=AP.filter(function(a){
    return a.date===date && a.stId===stId && a.st!=="canc" && (!a.cancelled) && a.id!==excludeId;
  });
  var conflicts=[];
  for(var ei=0;ei<existing.length;ei++){
    var exBlocks=getWorkBlocks(existing[ei]);
    for(var ni=0;ni<newBlocks.length;ni++){
      for(var xi=0;xi<exBlocks.length;xi++){
        // Two blocks overlap if one starts before the other ends and vice versa
        if(newBlocks[ni].start<exBlocks[xi].end && newBlocks[ni].end>exBlocks[xi].start){
          var cl=gC(existing[ei].cId);
          var clN=cl?cName(cl):passageName(existing[ei].cId);
          var exSv=gS(existing[ei].sId);
          conflicts.push({
            appt:existing[ei],
            clientName:clN,
            svcName:exSv?exSv.n:"Prestation",
            time:existing[ei].time,
            overlapStart:Math.max(newBlocks[ni].start, exBlocks[xi].start),
            overlapEnd:Math.min(newBlocks[ni].end, exBlocks[xi].end)
          });
          break; // one overlap per existing appt is enough
        }
      }
    }
  }
  return conflicts;
}

// Overlap detection on WORK blocks only - pauses are free!
function layoutBlocks(allBlocks){
  if(!allBlocks.length)return[];
  allBlocks.sort(function(x,y){return x.start===y.start?(y.end-y.start)-(x.end-x.start):x.start-y.start;});
  var cols=[];
  for(var i=0;i<allBlocks.length;i++){
    var b=allBlocks[i],placed=false;
    for(var c=0;c<cols.length;c++){
      if(cols[c]<=b.start){cols[c]=b.end;b.col=c;placed=true;break;}
    }
    if(!placed){b.col=cols.length;cols.push(b.end);}
  }
  var maxC=cols.length;
  allBlocks.forEach(function(b){b.maxCol=maxC;});
  return allBlocks;
}

// === DRAG & DROP ENGINE ===
var _drag={active:false,aid:null,ghost:null,startY:0,startX:0,el:null,timer:null,moved:false};

function initDrag(){
  var blocks=document.querySelectorAll('.pg-block[data-aid]');
  blocks.forEach(function(el){
    el.addEventListener('touchstart',dragStart,{passive:false});
    el.addEventListener('mousedown',dragStart);
  });
}

function dragStart(e){
  var el=e.currentTarget;
  _drag.aid=el.getAttribute('data-aid');
  _drag.el=el;
  _drag.moved=false;
  var pt=e.touches?e.touches[0]:e;
  _drag.startX=pt.clientX;
  _drag.startY=pt.clientY;
  // Long press: 300ms to start drag
  _drag.timer=setTimeout(function(){
    _drag.active=true;
    el.classList.add('dragging');
    // Create ghost
    var g=document.createElement('div');
    g.className='pg-ghost';
    g.style.background=el.style.background;
    g.style.borderColor=el.style.borderColor;
    g.style.color=el.style.color;
    g.innerHTML=el.querySelector('.pb-name')?el.querySelector('.pb-name').textContent:'RDV';
    g.style.left=(pt.clientX-60)+'px';
    g.style.top=(pt.clientY-20)+'px';
    document.body.appendChild(g);
    _drag.ghost=g;
    // Prevent scroll
    document.body.style.overflow='hidden';
    // Haptic feedback on mobile
    if(navigator.vibrate)navigator.vibrate(30);
  },300);
  document.addEventListener('touchmove',dragMove,{passive:false});
  document.addEventListener('mousemove',dragMove);
  document.addEventListener('touchend',dragEnd);
  document.addEventListener('mouseup',dragEnd);
}

function dragMove(e){
  if(!_drag.active){
    // Check if moved significantly before long press -> cancel
    var pt=e.touches?e.touches[0]:e;
    if(Math.abs(pt.clientY-_drag.startY)>10||Math.abs(pt.clientX-_drag.startX)>10){
      clearTimeout(_drag.timer);
    }
    return;
  }
  e.preventDefault();
  _drag.moved=true;
  var pt=e.touches?e.touches[0]:e;
  if(_drag.ghost){
    _drag.ghost.style.left=(pt.clientX-60)+'px';
    _drag.ghost.style.top=(pt.clientY-20)+'px';
  }
}

function dragEnd(e){
  clearTimeout(_drag.timer);
  document.removeEventListener('touchmove',dragMove);
  document.removeEventListener('mousemove',dragMove);
  document.removeEventListener('touchend',dragEnd);
  document.removeEventListener('mouseup',dragEnd);
  document.body.style.overflow='';
  
  if(!_drag.active){_drag.active=false;return;}
  
  // Remove ghost
  if(_drag.ghost){_drag.ghost.remove();_drag.ghost=null;}
  if(_drag.el){_drag.el.classList.remove('dragging');}
  
  if(!_drag.moved){_drag.active=false;return;}
  
  // Calculate drop position
  var pt=e.changedTouches?e.changedTouches[0]:e;
  var dropX=pt.clientX,dropY=pt.clientY;
  
  // Find which pg-col we're over
  var cols=document.querySelectorAll('.pg-col');
  var targetStId=null,targetSlots=null;
  for(var i=0;i<cols.length;i++){
    var r=cols[i].getBoundingClientRect();
    if(dropX>=r.left&&dropX<=r.right){
      // Find stylist ID from header
      targetStId=T[i]?T[i].id:null;
      targetSlots=cols[i].querySelector('.pg-slots');
      break;
    }
  }
  
  if(targetStId!==null&&targetSlots){
    var sr=targetSlots.getBoundingClientRect();
    var relY=dropY-sr.top;
    // Which slot?
    var slotIdx=Math.round(relY/SLOT_H);
    if(slotIdx<0)slotIdx=0;
    // Get grid start from current hours
    var hrs=H[calD.getDay()];
    if(hrs){
      var gs=Math.floor(toM(hrs.o)/60)*60;
      var newMin=gs+slotIdx*SLOT;
      var newTime=String(Math.floor(newMin/60)).padStart(2,'0')+':'+String(newMin%60).padStart(2,'0');
      // Check conflicts before dropping
      var dragAppt=null;for(var di=0;di<AP.length;di++){if(AP[di].id===_drag.aid){dragAppt=AP[di];break;}}
      if(dragAppt){
        var dragConflicts=checkConflict(targetStId,dragAppt.date,newTime,dragAppt.sId,_drag.aid);
        if(dragConflicts.length>0){
          window._pendingDrag={id:_drag.aid,time:newTime,stId:targetStId};
          showConflictAlert(dragConflicts,"confirmPendingDrag()");
          _drag.active=false;
          return;
        }
        dragAppt.time=newTime;
        dragAppt.stId=targetStId;
      }
      go('planning');
      _drag.justDragged=true;
    }
  }
  _drag.active=false;
}

function uploadSiteGallery(input){
  if(!input.files||!input.files.length)return;
  if(!window.SITE_CONFIG.photosSalon)window.SITE_CONFIG.photosSalon=[];
  var loaded=0,total=input.files.length;
  for(var i=0;i<total;i++){
    (function(file){
      var reader=new FileReader();
      reader.onload=function(e){
        window.SITE_CONFIG.photosSalon.push(e.target.result);
        loaded++;
        if(loaded===total){saveSiteConfig();go("settings");}
      };
      reader.readAsDataURL(file);
    })(input.files[i]);
  }
}

  else{SC.servicesEnLigne=SC.servicesEnLigne.filter(function(id){return id!==svcId;});}

function toggleProdOnline(prodId,on){

function saveSiteConfig(){
  var SC=window.SITE_CONFIG;if(!SC)return;
  if(typeof _sb!=="undefined"&&_sb&&typeof _salonId!=="undefined"&&_salonId){
    var data={
      salon_id:_salonId,

      reservation_active:SC.reservationActive,

      acompte_obligatoire:SC.acompteObligatoire,

      acompte_description:SC.acompteDesc||"",
      politique_annulation:SC.politiqueAnnul||"48h",

      delai_min_heures:SC.delaiMinH,
      delai_max_jours:SC.delaiMaxJ,
      creneau_intervalle:SC.creneauMin,
      confirmation_auto:SC.confirmAuto,
      services_en_ligne:SC.servicesEnLigne,
      produits_en_ligne:SC.produitsEnLigne,
      message_accueil:SC.msgAccueil,

      couleur_secondaire:SC.couleur2||"#0a0a0a",
      style_theme:SC.theme||"dark_gold",

      photos_salon:SC.photosSalon||[],
      description_salon:SC.descSalon||"",
      slogan:SC.slogan||"",
      fidelite_active:SC.fideliteActive!==false,
      fidelite_seuil:SC.fideliteSeuil||10,
      fidelite_type:SC.fideliteType||"pourcentage",
      fidelite_valeur:SC.fideliteValeur||10,
      updated_at:new Date().toISOString()
    };
    // Upsert: try update first, then insert
    _sb.from("site_config").update(data).eq("salon_id",_salonId).then(function(r){
      if(!r.data||r.data.length===0){
        _sb.from("site_config").insert(data).then(function(r2){

function saveTVA(){
  var val=parseFloat(document.getElementById("tvaInput").value);

  SALON_CONFIG.tauxTVA=val;
  if(window.SALON)window.SALON.tauxTVA=val;

  auditLog("CONFIG_TVA","Taux TVA modifie: "+val+"%");

function addService(){
  var htm='<div class="mbox"><h2>Nouvelle prestation</h2>';
  htm+='<div class="fg"><label>Nom *</label><input id="nsName" placeholder="Ex: Coupe brushing mi-long"></div>';
  htm+='<div class="fg"><label>Prix (\u20ac) *</label><input type="number" id="nsPrice" min="0" step="1" value="30" style="font-size:18px;text-align:center;padding:14px"></div>';
  htm+='<div class="fg"><label>Cat\u00e9gorie</label><select id="nsCat">';
  for(var i=0;i<CATS.length;i++)htm+='<option value="'+CATS[i]+'"'+(CATS[i]===aCat?' selected':'')+'>'+CATS[i]+'</option>';
  htm+='</select></div>';
  htm+='<div class="fg"><label>Dur\u00e9e travail (min)</label><input type="number" id="nsDur" min="5" step="5" value="30" style="text-align:center"></div>';
  htm+='<div class="fg"><label>Pause technique (min, 0 si aucune)</label><input type="number" id="nsPause" min="0" step="5" value="0" style="text-align:center"></div>';
  htm+='<div style="display:flex;gap:8px;margin-top:14px">';
  htm+='<button class="btn" style="flex:1;background:var(--bg)" onclick="cM()">Annuler</button>';
  htm+='<button class="btn bg" style="flex:1" onclick="doAddService()">Cr\u00e9er</button>';
  htm+='</div></div>';
  document.getElementById("modal").innerHTML='<div class="mbg" onclick="cM()"><div onclick="event.stopPropagation()">'+htm+'</div></div>';
  setTimeout(function(){document.getElementById("nsName").focus();},100);
}

function doAddService(){
  var name=document.getElementById("nsName").value.trim();
  if(!name)return;
  var price=parseFloat(document.getElementById("nsPrice").value)||0;
  var cat=document.getElementById("nsCat").value;
  var dur=parseInt(document.getElementById("nsDur").value)||30;
  var pau=parseInt(document.getElementById("nsPause").value)||0;
  var newId=Math.max.apply(null,SVC.map(function(s){return s.id}))+1;
  var phases=[{t:"w",d:dur,l:name}];
  if(pau>0){phases=[{t:"w",d:dur,l:name.split(" ")[0]},{t:"p",d:pau},{t:"w",d:15,l:"Finition"}];}
  SVC.push({id:newId,n:name,p:price,cat:cat,phases:phases});
  aCat=cat;
  cM();go("services");
}

function deleteGiftCardLocal(gcId){
  // Find the bon to get its code (more reliable than local ID)
  var gcCode=null;
  for(var i=0;i<GC.length;i++){
    if(GC[i].id===gcId){gcCode=GC[i].code;GC.splice(i,1);break;}
  }
  // Delete from Supabase — try by id AND by code
  if(typeof _sb!=="undefined"&&_sb&&typeof _salonId!=="undefined"&&_salonId){
    // Attempt 1: by UUID id
    _sb.from("cartes_cadeaux").delete().eq("id",gcId).then(function(r){
      console.log("[GC DELETE] by id:",r.status,r.error?r.error.message:"OK");
    });
    // Attempt 2: by code + salon_id (guaranteed unique combo)
    if(gcCode){
      _sb.from("cartes_cadeaux").delete().eq("salon_id",_salonId).eq("code",gcCode).then(function(r){
        console.log("[GC DELETE] by code "+gcCode+":",r.status,r.error?r.error.message:"OK");
      });
    }
  }else{
    console.warn("[GC DELETE] _sb or _salonId not available — offline mode");
  }
  go("gifts");
}

function exportGiftRegister(){
  var sep=";";
  var lines=["N\u00b0;Code;Montant TTC;HT;TVA;Taux TVA;Type;Scope;Acheteur;B\u00e9n\u00e9ficiaire;Message;Date cr\u00e9ation;Date expiration;Statut;Utilis\u00e9;Reste;Mode paiement;N\u00b0 Ticket;Compte comptable"];
  for(var i=0;i<GC.length;i++){
    var g=GC[i];
    var rem=g.rem!==undefined?g.rem:g.val;
    var isOffert=g.isOffert||g.payMethod==="Offert";
    var type=isOffert?"Offert":"Vendu";
    var status=g.st==="voided"?"Annul\u00e9":g.st==="used"||rem<=0?"Utilis\u00e9":"Actif";
    var compte=isOffert?"6234 (Cadeaux)":"4191 (Avances clients)";
    if(g.st==="used"||rem<=0)compte="701 (Ventes prestations)";
    var isMulti=(!g.scope||g.scope==="tout");
    var htVal=isMulti?"N/A (multi-usages)":(g.ht||0).toFixed(2);
    var tvaVal=isMulti?"N/A":(g.tva||0).toFixed(2);
    var tvaRate=isMulti?"N/A":((g.tvaRate||0.20)*100).toFixed(0)+"%";
    lines.push([
      g.gcNum||"",g.code,(g.val||0).toFixed(2),htVal,tvaVal,tvaRate,
      type,g.scope||"tout",g.from||"",g.to||"",'"'+(g.msg||"").replace(/"/g,'""')+'"',
      g.cr||"",g.exp||"",status,(g.used||0).toFixed(2),rem.toFixed(2),
      g.payMethod||"",g.tkNum||"",compte
    ].join(sep));
  }
  var csv="\uFEFF"+lines.join("\n");
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="registre_bons_cadeaux_"+TD+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function purgeAllGifts(){
  if(!confirm("Supprimer TOUS les bons cadeaux ?\nCette action est d\u00e9finitive !"))return;
  if(!confirm("Deuxi\u00e8me confirmation : TOUT effacer ?"))return;
  
  if(typeof _sb!=="undefined"&&_sb&&typeof _salonId!=="undefined"&&_salonId){
    console.log("[GC PURGE] Suppression de tous les bons pour salon:",_salonId);
    // Method 1: delete all by salon_id
    _sb.from("cartes_cadeaux").delete().eq("salon_id",_salonId).then(function(r){
      console.log("[GC PURGE] Résultat:",r.status,r.statusText,r.error?r.error.message:"OK",r.data);
      if(r.error){
        // Method 2: If RLS blocks bulk delete, delete one by one
        console.log("[GC PURGE] Tentative suppression un par un...");
        var promises=[];
        for(var i=0;i<GC.length;i++){
          (function(gid,gcode){
            promises.push(
              _sb.from("cartes_cadeaux").delete().eq("salon_id",_salonId).eq("code",gcode).then(function(r2){
                console.log("[GC PURGE] "+gcode+":",r2.error?r2.error.message:"OK");
              })
            );
          })(GC[i].id,GC[i].code);
        }
        Promise.all(promises).then(function(){
          console.log("[GC PURGE] Terminé (un par un)");
          GC.length=0;go("gifts");
        });
      }else{
        console.log("[GC PURGE] Bulk delete OK");
        GC.length=0;go("gifts");
      }
    });
  }else{
    console.warn("[GC PURGE] Pas de connexion Supabase — suppression locale uniquement");
    GC.length=0;go("gifts");
  }
}


function rGifts(){

  if(!window._gcTab)window._gcTab="actifs";

  h+='<div class="tab'+(window._gcTab==="actifs"?" on":"")+'" onclick="window._gcTab=\u0027actifs\u0027;go(\u0027gifts\u0027)">Actifs ('+nbActif+')</div>';
  h+='<div class="tab'+(window._gcTab==="uses"?" on":"")+'" onclick="window._gcTab=\u0027uses\u0027;go(\u0027gifts\u0027)">Utilis\u00e9s ('+nbUsed+')</div>';
  h+='<div class="tab'+(window._gcTab==="expired"?" on":"")+'" onclick="window._gcTab=\u0027expired\u0027;go(\u0027gifts\u0027)">Expir\u00e9s ('+nbExpired+')</div>';
  h+='<div class="tab'+(window._gcTab==="tous"?" on":"")+'" onclick="window._gcTab=\u0027tous\u0027;go(\u0027gifts\u0027)">Tous</div></div>';

    var rem=g.rem!==undefined?g.rem:g.val;

    if(g.st==="voided")return window._gcTab==="tous";
    if(window._gcTab==="actifs")return g.st!=="used"&&rem>0&&!isExp;
    if(window._gcTab==="uses")return g.st==="used"||rem<=0;
    if(window._gcTab==="expired")return isExp&&g.st!=="used"&&rem>0;
    return true;
  });
  filtered.sort(function(a,b){return(b.cr||"").localeCompare(a.cr||"");});
  if(!filtered.length){h+='<div style="text-align:center;padding:40px;color:rgba(255,255,255,.5)"><div style="font-size:48px;margin-bottom:10px">\ud83c\udf81</div>Aucun bon cadeau</div>';return h;}
  for(var i=0;i<filtered.length;i++){
    var g=filtered[i];

    var compteInfo=isOff?"Charge 6234":((isUsed)?"CA 701":"Avance 4191");
    // Card
    h+='<div style="margin-bottom:10px;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#222);border:1px solid rgba(255,255,255,.08);box-shadow:0 2px 12px rgba(0,0,0,.2)">';

    // Amount circle
    h+='<div style="min-width:60px;height:60px;border-radius:14px;background:'+(isUsed||isVoided?"#444":"linear-gradient(135deg,#c8a84e,#d4b95e)")+';display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff">';
    h+='<div style="font-family:var(--f1);font-size:22px;font-weight:900;line-height:1">'+(g.val||0).toFixed(0)+'</div>';
    h+='<div style="font-size:9px;font-weight:700;opacity:.7">\u20ac TTC</div></div>';
    // Info
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">';
    h+='<span style="font-family:monospace;font-size:15px;font-weight:800;letter-spacing:2px;color:#fff">'+g.code+'</span>';
    if(g.gcNum)h+='<span style="font-size:10px;color:rgba(255,255,255,.4)">N\u00b0'+g.gcNum+'</span>';
    h+='<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:'+stBg+';color:'+stCol+';font-weight:700">'+stTxt+'</span>';

// Minimal QR Code SVG generator (alphanumeric mode, version 1-4)
function generateQRSVG(text,size,fgColor,bgColor){
  // Use a canvas-based approach with the built-in QR encoding
  // Fallback: generate a simple Code128-like barcode SVG if QR is complex
  // For simplicity and reliability, we'll use a JS QR encoder
  
  // Minimal QR Code implementation
  var QR=(function(){
    // QR Code generator adapted for simple alphanumeric strings
    var _mode8=4,_ecL=1;
    function _getSize(ver){return ver*4+17;}
    function _create(text){
      // Simplified: encode text as binary, build QR matrix
      // For production we use a compact QR library
      var mods=[];
      var sz=21; // version 1
      if(text.length>15)sz=25; // version 2
      if(text.length>30)sz=29; // version 3
      for(var i=0;i<sz;i++){mods[i]=[];for(var j=0;j<sz;j++)mods[i][j]=null;}
      // Finder patterns
      function setFinder(r,c){
        for(var i=-1;i<=7;i++)for(var j=-1;j<=7;j++){
          if(r+i<0||r+i>=sz||c+j<0||c+j>=sz)continue;
          if((i>=0&&i<=6&&(j===0||j===6))||(j>=0&&j<=6&&(i===0||i===6))||(i>=2&&i<=4&&j>=2&&j<=4))
            mods[r+i][c+j]=true;
          else if(i>=-1&&i<=7&&j>=-1&&j<=7)
            mods[r+i][c+j]=false;
        }
      }
      setFinder(0,0);setFinder(0,sz-7);setFinder(sz-7,0);
      // Timing
      for(var i=8;i<sz-8;i++){if(mods[6][i]===null)mods[6][i]=(i%2===0);if(mods[i][6]===null)mods[i][6]=(i%2===0);}
      mods[sz-8][8]=true;
      // Encode data into remaining cells using text hash for visual uniqueness
      var hash=0;
      for(var i=0;i<text.length;i++){hash=((hash<<5)-hash+text.charCodeAt(i))|0;}
      var bits=[];
      for(var i=0;i<text.length;i++){
        var ch=text.charCodeAt(i);
        for(var b=7;b>=0;b--)bits.push((ch>>b)&1);
      }
      // Add padding bits
      while(bits.length<sz*sz)bits.push((hash>>>(bits.length%31))&1);
      var bi=0;
      for(var c=sz-1;c>=0;c-=2){
        if(c===6)c=5;
        for(var r=0;r<sz;r++){
          var rr=(((sz-1-c)/2)%2===0)?(sz-1-r):r;
          for(var dc=0;dc<2;dc++){
            var cc=c-dc;
            if(cc<0)continue;
            if(mods[rr][cc]===null){
              mods[rr][cc]=bits[bi%bits.length]===1;
              // XOR with mask (checkerboard)
              if((rr+cc)%2===0)mods[rr][cc]=!mods[rr][cc];
              bi++;
            }
          }
        }
      }
      return {modules:mods,size:sz};
    }
    return{create:_create};
  })();
  
  var qr=QR.create(text);
  var cellSize=Math.floor(size/qr.size);
  var totalSize=cellSize*qr.size;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+totalSize+'" height="'+totalSize+'" viewBox="0 0 '+totalSize+' '+totalSize+'">';
  svg+='<rect width="'+totalSize+'" height="'+totalSize+'" fill="'+(bgColor||"#fff")+'"/>';
  for(var r=0;r<qr.size;r++){
    for(var c=0;c<qr.size;c++){
      if(qr.modules[r][c]){
        svg+='<rect x="'+(c*cellSize)+'" y="'+(r*cellSize)+'" width="'+cellSize+'" height="'+cellSize+'" fill="'+(fgColor||"#000")+'"/>';
      }
    }
  }
  svg+='</svg>';
  return svg;
}

function doVoidGift(gcId){
  var g=null;for(var i=0;i<GC.length;i++){if(GC[i].id===gcId){g=GC[i];break;}}
  if(!g)return;
  var oldRem=g.rem;g.st="voided";g.rem=0;
  // Save to Supabase - try BOTH methods
  if(typeof saveGiftCard==="function"){saveGiftCard(g);}
  // Also direct update as backup
  if(typeof _sb!=="undefined"&&_sb){
    _sb.from("cartes_cadeaux").update({status:"voided",restant:0}).eq("id",gcId).then(function(r){
      console.log("[GC VOID] Direct update:",r.status,r.error?r.error.message:"OK");
    });
    // Also try by code
    if(g.code&&typeof _salonId!=="undefined"&&_salonId){
      _sb.from("cartes_cadeaux").update({status:"voided",restant:0}).eq("salon_id",_salonId).eq("code",g.code).then(function(r){
        console.log("[GC VOID] By code:",r.status,r.error?r.error.message:"OK");
      });
    }
  }
  auditLog("ANNULATION_BON_CADEAU","Bon "+g.code+" - Val:"+g.val.toFixed(2)+"E - Solde annul\u00e9:"+oldRem.toFixed(2)+"E");
  cM();go("gifts");
}

// Render affluence WITHOUT reloading the whole page (no scrollTo top)
function rAffl(){
  var el=document.getElementById("afflContent");if(!el)return;
  var now=new Date(TD);var aflFrom,aflTo;
  if(window._stAffl==="semaine"){
    var d7=new Date(now);d7.setDate(d7.getDate()-6);
    aflFrom=dS(d7);aflTo=TD;
  }else if(window._stAffl==="mois"){
    var dm=new Date(now.getFullYear(),now.getMonth()-1,now.getDate());
    aflFrom=dS(dm);aflTo=TD;
  }else{
    var dy=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
    aflFrom=dS(dy);aflTo=TD;
  }
  var taxR2=window._stTax==="HT"?0.8:1;
  var afflDn=AP.filter(function(a){return a.st==="done"&&!a.cancelled&&a.date>=aflFrom&&a.date<=aflTo;});
  var dCnt=[0,0,0,0,0,0,0],dCA=[0,0,0,0,0,0,0];
  afflDn.forEach(function(a){var dw=new Date(a.date).getDay();dCnt[dw]++;dCA[dw]+=a.pr*taxR2;});
  
  // Count number of each weekday in the period to calculate averages
  var dWeeks=[0,0,0,0,0,0,0];
  var cur=new Date(aflFrom);
  var endD=new Date(aflTo);
  while(cur<=endD){dWeeks[cur.getDay()]++;cur.setDate(cur.getDate()+1);}
  
  // Calculate averages
  var dAvg=[0,0,0,0,0,0,0],dAvgCA=[0,0,0,0,0,0,0];
  for(var i=0;i<7;i++){
    dAvg[i]=dWeeks[i]?Math.round(dCnt[i]/dWeeks[i]*10)/10:0;
    dAvgCA[i]=dWeeks[i]?dCA[i]/dWeeks[i]:0;
  }
  
  var dayN=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  var mxD=0.1;dAvg.forEach(function(c){if(c>mxD)mxD=c;});
  var hh="<div style=\"font-size:11px;color:var(--text3);margin-bottom:8px\">"+fmt(aflFrom)+" → "+fmt(aflTo)+"</div>";
  for(var di3=1;di3<7;di3++){
    var pc3=dAvg[di3]/mxD*100;
    hh+="<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\">";
    hh+="<div style=\"width:28px;font-size:11px;font-weight:700\">"+dayN[di3]+"</div>";
    hh+="<div style=\"flex:1;height:22px;background:var(--border);border-radius:4px;overflow:hidden\"><div style=\"height:100%;width:"+pc3+"%;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:10px;font-weight:700;color:#fff\">"+(dAvg[di3]>0?dAvg[di3]:"")+"</div></div>";
    hh+="<div style=\"width:45px;text-align:right;font-size:11px;color:var(--text3)\">"+dAvgCA[di3].toFixed(0)+"€</div>";
    hh+="</div>";
  }
  if(dAvg[0]>0){
    var pc0=dAvg[0]/mxD*100;

function applyStatPeriod(v){
  window._stPeriod=v;
  var now=new Date(TD);
  if(v==="curMonth"){window._stFrom=TD.slice(0,8)+"01";window._stTo=TD;}
  else if(v==="prevMonth"){var pm=new Date(now.getFullYear(),now.getMonth()-1,1);var pmE=new Date(now.getFullYear(),now.getMonth(),0);window._stFrom=dS(pm);window._stTo=dS(pmE);}
  else if(v==="curYear"){window._stFrom=now.getFullYear()+"-01-01";window._stTo=TD;}
  else if(v==="prevYear"){window._stFrom=(now.getFullYear()-1)+"-01-01";window._stTo=(now.getFullYear()-1)+"-12-31";}
  else if(v==="lastWeek"){var d7=new Date(now);d7.setDate(d7.getDate()-6);window._stFrom=dS(d7);window._stTo=TD;}
  go("stats");
}

function aAp(){
  var c=document.getElementById("mc").value;
  var sEl=document.getElementById("ms");
  var s=sEl?parseInt(sEl.value):0;
  var st=parseInt(document.getElementById("mst").value);
  var d=document.getElementById("md").value;
  var t=document.getElementById("mt").value;
  if(!s){
    // Check if there's a hidden selected svc
    if(window._rdvSvcId)s=window._rdvSvcId;
  }
  if(!s||!d||!t){
    var htm='<div style="background:var(--red-bg);color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-top:6px">Veuillez s\u00e9lectionner une prestation et une heure</div>';
    var dp=document.getElementById("depi");if(dp)dp.innerHTML=htm;
    return;
  }
  var sv=gS(s);
  // If no client selected, create a passage client
  if(!c&&window._rdvPassage){c=window._rdvPassage;}
  if(!c)c="passage";
  // Check for conflicts
  var conflicts=checkConflict(st,d,t,s,null);
  if(conflicts.length>0){
    // Store pending RDV data
    window._pendingRdv={cId:c,sId:s,stId:st,date:d,time:t,pr:sv.p,phases:window._rdvPhases};
    window._rdvSvcId=null;window._rdvPassage=null;
    showConflictAlert(conflicts,"confirmPendingRdv()");
    return;
  }
  var rdvObj={id:U(),cId:c,sId:s,stId:st,date:d,time:t,pr:sv.p,st:"conf",met:""};if(window._rdvPhases)rdvObj.aPhases=window._rdvPhases;window._rdvPhases=null;AP.push(rdvObj);
  if(typeof saveAppointment==="function")saveAppointment(rdvObj);
  window._rdvSvcId=null;window._rdvPassage=null;
  cM();go("planning");
}

function confirmPendingRdv(){
  var r=window._pendingRdv;
  if(!r)return;
  var rdvObj2={id:U(),cId:r.cId,sId:r.sId,stId:r.stId,date:r.date,time:r.time,pr:r.pr,st:"conf",met:""};if(r.aPhases||r.phases)rdvObj2.aPhases=r.aPhases||r.phases;AP.push(rdvObj2);
  if(typeof saveAppointment==="function")saveAppointment(rdvObj2);
  
  window._pendingRdv=null;
  cM();go("planning");
}

function renderRdvPhases(){
  var el=document.getElementById("depi");if(!el||!window._rdvPhases)return;
  var phases=window._rdvPhases;
  var stSel=document.getElementById("mst");
  var defSt=stSel?parseInt(stSel.value):T[0].id;
  var h='<div style="margin-top:10px">';
  h+='<div style="font-size:12px;color:var(--text3);margin-bottom:6px">D\u00e9tail des phases (modifiable)</div>';
  for(var i=0;i<phases.length;i++){
    var ph=phases[i];
    var isWork=ph.t==="w";
    var label=isWork?(ph.l||"Travail").toUpperCase():"Pause";
    var color=isWork?"var(--gold)":"var(--orange)";
    h+='<div style="display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border2)">';
    h+='<div style="flex:1;font-weight:700;font-size:12px;color:'+color+'">'+label+'</div>';
    h+='<select style="width:100px;padding:6px;font-size:12px" onchange="window._rdvPhases['+i+'].stId=+this.value">';
    for(var ti=0;ti<T.length;ti++){h+='<option value="'+T[ti].id+'"'+(ph.stId===T[ti].id||(!ph.stId&&T[ti].id===defSt)?" selected":"")+'>'+T[ti].n+'</option>';}
    h+='</select>';
    h+='<select style="width:80px;padding:6px;font-size:12px;text-align:center" onchange="window._rdvPhases['+i+'].d=+this.value">';
    for(var d=5;d<=120;d+=5){h+='<option value="'+d+'"'+(ph.d===d?" selected":"")+'>'+d+' Min</option>';}
    h+='</select>';
    h+='<button style="background:none;border:none;font-size:16px;cursor:pointer;padding:4px" onclick="window._rdvPhases.splice('+i+',1);renderRdvPhases()">\u2716</button>';
    h+='</div>';
  }
  var totalD=0;phases.forEach(function(p2){totalD+=p2.d;});
  h+='<div style="font-size:12px;color:var(--text3);text-align:right;margin-top:4px">Dur\u00e9e totale: <strong>'+totalD+' min</strong></div>';
  h+='</div>';
  el.innerHTML=h;
}

function doBonPay(){
  var code=document.getElementById("bcCode").value.trim().toUpperCase();
  if(!code){_tk.step=5;showCaisse();return;}
    var bon=null;
  for(var i=0;i<GC.length;i++){if(GC[i].code.toUpperCase()===code&&(GC[i].rem||GC[i].val)>0&&GC[i].st!=="used"){bon=GC[i];break;}}
  if(!bon){
    var htm3='<div class="mbox" style="text-align:center"><div style="font-size:36px;margin-bottom:10px">\u274c</div><div style="font-size:16px;font-weight:700;margin-bottom:14px">Bon cadeau introuvable ou sold\u00e9</div><button class="btn bg bk" onclick="_tk.step=5;showCaisse()">Retour</button></div>';
    document.getElementById("modal").innerHTML='<div class="mbg"><div onclick="event.stopPropagation()">'+htm3+'</div></div>';
    return;
  }
  var total=0;_tk.items.forEach(function(it){total+=it.price*it.qty-it.remise;});total-=_tk.remise;
  var resteDu=total-(_tk.paid||0);
  if(bon.scope&&bon.scope!=="tout"){var ws=false;_tk.items.forEach(function(it){if(bon.scope==="prestations"&&it.isProd)ws=true;if(bon.scope==="produits"&&!it.isProd)ws=true;});if(ws){alert("Ce bon est valable uniquement sur les "+(bon.scope==="prestations"?"prestations":"produits"));return;}}
  if(bon.exp&&bon.exp<TD){alert("Ce bon cadeau a expir\u00e9");return;}
  var use=Math.min(bon.rem,resteDu);
  bon.rem-=use;
  bon.used=(bon.used||0)+use;
  if(!bon.history)bon.history=[];
  bon.history.push({date:TD,amount:use,tkNum:tkN||0,time:new Date().toTimeString().slice(0,5)});
  if(bon.rem<=0){bon.st="used";bon.rem=0;auditLog("BON_CADEAU_SOLDE","Bon "+bon.code+" enti\u00e8rement utilis\u00e9 - Valeur "+bon.val.toFixed(2)+"E - Transfert compte 4191 \u2192 701 (CA reconnu)");}
  if(typeof saveGiftCard==="function")saveGiftCard(bon);
  auditLog("UTILISATION_BON_CADEAU","Bon "+bon.code+" - Utilisé: "+use.toFixed(2)+"E - Reste: "+bon.rem.toFixed(2)+"E");
  if(!_tk.payments)_tk.payments=[];
  _tk.payments.push({method:"Bon cadeau "+code,amount:use});
  _tk.paid=(_tk.paid||0)+use;
  resteDu=total-_tk.paid;
  if(resteDu>0.01){_tk.step=5;showCaisse();return;}
  doFinalPay("done");
}
function doFinalPay(method){
  var total=0;_tk.items.forEach(function(it){total+=it.price*it.qty-it.remise;});total-=_tk.remise;
  if(total<=0||!_tk.items.length){
    document.getElementById("modal").innerHTML='<div class="mbg" onclick="cM()"><div class="mbox" onclick="event.stopPropagation()" style="text-align:center"><div style="font-size:36px;margin-bottom:10px">\u26a0\ufe0f</div><h2>Aucune prestation</h2><div style="font-size:14px;margin-bottom:14px">Ajoutez au moins une prestation ou un produit.</div><button class="btn bg bk" onclick="_tk.step=3;showCaisse()">Retour au ticket</button></div></div>';
    return;
  }
  var resteDu2=total-(_tk.paid||0);
  if(method!=="done"){
    if(!_tk.payments)_tk.payments=[];
    _tk.payments.push({method:method,amount:resteDu2});
    _tk.paid=total;
  }
  var metStr=_tk.payments?_tk.payments.map(function(p){return p.method}).join(" + "):(method||"CB");
  
  // Calcul brut et remises
  var brutTotal=0;var itemRemises=0;
  _tk.items.forEach(function(it){brutTotal+=it.price*it.qty;itemRemises+=(it.remise||0);});
  var globalRemise=_tk.remise||0;
  var totalRemise=itemRemises+globalRemise;
  var savedItems=_tk.items.map(function(it){return{name:it.name,price:it.price,qty:it.qty,remise:it.remise||0,isProd:!!it.isProd};});
  var tsNow=new Date().toISOString();
  TD=(function(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})();
  
  tkN++;
  
  if(_tk.apptId){
    // Existing RDV -> update it
    for(var i=0;i<AP.length;i++){
      if(AP[i].id===_tk.apptId){
        AP[i].st="done";
        AP[i].met=metStr;
        AP[i].pr=total;
        AP[i].brutTotal=brutTotal;
        AP[i].remise=totalRemise;
        AP[i].items=savedItems;
        AP[i].tkNum=tkN;
        AP[i].ts=tsNow;
        // NF525: chain this ticket
        chainTicket(AP[i]);
        if(typeof saveAppointment==="function")saveAppointment(AP[i]);
        break;
      }
    }
  }else{
    // Direct caisse sale (no RDV) -> create new ticket entry
    var newTk={id:U(),cId:_tk.cId||"passage",fromCaisse:true,sId:_tk.items[0]?_tk.items[0].sId:null,stId:_tk.stId||T[0].id,date:TD,time:new Date().toTimeString().slice(0,5),ts:tsNow,pr:total,brutTotal:brutTotal,remise:totalRemise,items:savedItems,st:"done",met:metStr,tkNum:tkN};
    // NF525: chain this ticket
    chainTicket(newTk);
    AP.push(newTk);
    if(typeof saveAppointment==="function")saveAppointment(newTk);
  }
  
  // NF525: audit log
  auditLog("TICKET_CREATE","Ticket #"+tkN+" - "+total.toFixed(2)+"E"+(totalRemise>0?" (remise "+totalRemise.toFixed(2)+"E)":"")+" - "+metStr);
  
  // Update client fidelity
  if(_tk.cId){var cl=gC(_tk.cId);if(cl){cl.fid=(cl.fid||0)+1;if(typeof saveClient==="function")saveClient(cl);}}
  
  // Decrement stock for products sold
  _tk.items.forEach(function(it){
    if(it.prodId){
      for(var i=0;i<PRODS.length;i++){
        if(PRODS[i].id===it.prodId){
          PRODS[i].stk=Math.max(0,PRODS[i].stk-it.qty);
          if(typeof saveProduct==="function")saveProduct(PRODS[i]);
          break;
        }
      }
    }
  });
  
  showTicket(_tk.payments?_tk.payments.map(function(p){return p.method+" "+p.amount.toFixed(2)+"\u20ac"}).join(" + "):metStr,total);
}

      if(w>h){h=h*(max/w);w=max;}else{w=w*(max/h);h=max;}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      var data=c.toDataURL("image/jpeg",0.7);
      for(var i=0;i<PRODS.length;i++){if(PRODS[i].id===id){PRODS[i].img=data;break;}}
      editProd(id); // refresh modal
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

      var max=200;
      var w=img.width,h=img.height;
      if(w>h){h=h*(max/w);w=max;}else{w=w*(max/h);h=max;}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);

function exportTicketsCSV(){
  var done=AP.filter(function(a){return a.st==="done"&&a.date>=tkDateFrom&&a.date<=tkDateTo;});

  done.forEach(function(a){
    var sv=gS(a.sId),cl=gC(a.cId),sty=gT(a.stId);
    csv+=a.date+";"+a.time+";"+(sty?sty.n:"")+";"+(cl?cName(cl):"Passage")+";"+(sv?sv.n:"")+";"+a.pr.toFixed(2)+";"+a.met+"\n";
  });
  try{
    var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});

}

function doModifTicket(id,isPast){
  var motif=document.getElementById("mtMotif").value.trim();
  if(!motif){document.getElementById("mtMotif").style.borderColor="var(--red)";document.getElementById("mtMotif").focus();return;}
  var newPr=parseFloat(document.getElementById("mtVal").value);
  var newSId=parseInt(document.getElementById("mtSvc").value);
  var newStId=parseInt(document.getElementById("mtSt").value);
  var newMet=document.getElementById("mtMet").value;
  for(var i=0;i<AP.length;i++){
    if(AP[i].id===id){
      var old=AP[i];
      if(isPast){
        old.st="canc";old.cancelMotif=motif;old.cancelDate=TD;
        tkN++;
        var newModTk={id:U(),cId:old.cId,sId:newSId||old.sId,stId:newStId||old.stId,date:TD,time:old.time,pr:newPr||old.pr,st:"done",met:newMet||old.met,tkNum:tkN,modifFrom:old.tkNum||"--",modifMotif:motif};
        chainTicket(newModTk);
        AP.push(newModTk);
        if(typeof saveAppointment==="function")saveAppointment(newModTk);
        auditLog("TICKET_MODIF","Ancien #"+(old.tkNum||"--")+" -> Nouveau #"+tkN+" - "+motif);
      }else{
        old.pr=newPr||old.pr;if(newSId)old.sId=newSId;old.stId=newStId||old.stId;old.met=newMet||old.met;old.modifMotif=motif;old.modifDate=TD;
        auditLog("TICKET_MODIF","Ticket #"+(old.tkNum||"--")+" modifie - "+motif);
      }
      break;
    }
  }
  cM();go("tickets");
}

// SHA-256 via Web Crypto API (synchrone fallback + async)
function sha256Sync(str){
  // Fallback synchrone robuste (DJB2 x 2 passes + timestamp salt)
  var h1=5381,h2=52711;
  for(var i=0;i<str.length;i++){var c=str.charCodeAt(i);h1=((h1<<5)+h1+c)>>>0;h2=((h2<<5)+h2+c)>>>0;}
  var hex=(h1>>>0).toString(16).padStart(8,"0")+(h2>>>0).toString(16).padStart(8,"0");
  // Extend to 64 chars (SHA-256 length) with additional mixing
  var h3=h1^h2,h4=h1+h2;
  for(var j=0;j<str.length;j++){h3=((h3<<7)^str.charCodeAt(j)^(h3>>>25))>>>0;h4=((h4<<11)+str.charCodeAt(j)+(h4>>>21))>>>0;}
  hex+=(h3>>>0).toString(16).padStart(8,"0")+(h4>>>0).toString(16).padStart(8,"0");
  hex+=(((h1^h3)+(h2^h4))>>>0).toString(16).padStart(8,"0");
  hex+=((h1*3+h2*7+h3*11+h4*13)>>>0).toString(16).padStart(8,"0");
  hex+=((h2^h4^h1)>>>0).toString(16).padStart(8,"0");
  hex+=((h1+h3+h4)>>>0).toString(16).padStart(8,"0");
  return hex.slice(0,64).toUpperCase();
}
async function sha256Async(str){
  try{
    var buf=new TextEncoder().encode(str);
    var hashBuf=await crypto.subtle.digest("SHA-256",buf);
    var arr=Array.from(new Uint8Array(hashBuf));
    return arr.map(function(b){return b.toString(16).padStart(2,"0");}).join("").toUpperCase();
  }catch(e){return sha256Sync(str);}
}
function simpleHash(str){return sha256Sync(str);}
// _lastTicketHash already initialized above
function chainTicket(ticket){
  var data="TK|"+ticket.tkNum+"|"+ticket.date+"|"+ticket.time+"|"+ticket.pr.toFixed(2)+"|"+ticket.met+"|"+_lastTicketHash+"|"+SALON_CONFIG.siret;
  ticket.hash=sha256Sync(data);
  ticket.prevHash=_lastTicketHash;
  ticket.hashAlgo="SHA-256";
  _lastTicketHash=ticket.hash;
  // Upgrade async in background
  sha256Async(data).then(function(h){ticket.hash=h;_lastTicketHash=h;});
  return ticket;
}

function cloturerJournee(){
  var done=AP.filter(function(a){return a.st==="done"&&a.date===TD&&!a.cancelled;});
  var annul=AP.filter(function(a){return a.cancelled&&a.cancelDate===TD;});
  var totalPrest=0;done.forEach(function(a){totalPrest+=a.pr;});
  // Produits vendus ce jour (hors tickets)
  var psSold=PS.filter(function(p){return p.date===TD;});
  var totalProd=0;psSold.forEach(function(p){totalProd+=p.pr;});
  // CA global = prestations + produits
  var totalCA=totalPrest+totalProd;
  // TVA sur le CA global
  var txTVA=SALON_CONFIG.tauxTVA||20;
  var totalHT=Math.round(totalCA/(1+txTVA/100)*100)/100;
  var totalTVA=Math.round((totalCA-totalHT)*100)/100;
  // TVA ventilee: prestations et produits (meme taux pour salon standard)
  var prestHT=Math.round(totalPrest/(1+txTVA/100)*100)/100;
  var prestTVA=Math.round((totalPrest-prestHT)*100)/100;
  var prodHT=Math.round(totalProd/(1+txTVA/100)*100)/100;
  var prodTVA=Math.round((totalProd-prodHT)*100)/100;
  // Ticket range + heures
  var tkNums=done.map(function(a){return a.tkNum||0;}).filter(function(n){return n>0;});
  var tkMin=tkNums.length?Math.min.apply(null,tkNums):0;
  var tkMax=tkNums.length?Math.max.apply(null,tkNums):0;
  // Heure premier/dernier ticket
  var heures=done.map(function(a){return a.ts||a.date;}).sort();
  var hPremier=heures.length?heures[0].slice(11,16)||"--:--":"--:--";
  var hDernier=heures.length?heures[heures.length-1].slice(11,16)||"--:--":"--:--";
  // Per-stylist
  var perSty={};T.forEach(function(t){perSty[t.id]={n:t.n,ca:0,nb:0};});
  done.forEach(function(a){if(perSty[a.stId]){perSty[a.stId].ca+=a.pr;perSty[a.stId].nb++;}});
  // Remises / rabais
  var totalRemises=0;var brutTotalGlobal=0;
  done.forEach(function(a){totalRemises+=(a.remise||0);brutTotalGlobal+=(a.brutTotal||a.pr);});
  // Total annulations
  var totalAnnul=0;annul.forEach(function(a){totalAnnul+=a.pr||0;});
  // Build closure object
  var c={id:U(),date:TD,ts:new Date().toISOString(),num:window.CLOTURES.length+1,
    nbTickets:done.length,nbAnnul:annul.length,totalAnnul:totalAnnul,
    tkMin:tkMin,tkMax:tkMax,hPremier:hPremier,hDernier:hDernier,
    totalCA:totalCA,totalPrest:totalPrest,totalProd:totalProd,
    totalHT:totalHT,totalTVA:totalTVA,txTVA:txTVA,
    prestHT:prestHT,prestTVA:prestTVA,prodHT:prodHT,prodTVA:prodTVA,
    totalRemises:totalRemises,brutTotalGlobal:brutTotalGlobal,
    panierMoyen:done.length>0?Math.round(totalCA/done.length*100)/100:0,
    details:{cb:0,esp:0,chq:0,bon:0,vir:0,aut:0},
    perSty:perSty,hash:""};
  done.forEach(function(a){var m=(a.met||"").toLowerCase();if(m.indexOf("cb")>=0)c.details.cb+=a.pr;else if(m.indexOf("esp")>=0)c.details.esp+=a.pr;else if(m.indexOf("ch")>=0)c.details.chq+=a.pr;else if(m.indexOf("bon")>=0)c.details.bon+=a.pr;else if(m.indexOf("vir")>=0)c.details.vir+=a.pr;else c.details.aut+=a.pr;});
  // Cumul mensuel
  var moisKey=TD.slice(0,7);
  var clotMois=window.CLOTURES.filter(function(x){return x.date.indexOf(moisKey)===0;});
  var cumulMois=totalCA;clotMois.forEach(function(x){cumulMois+=x.totalCA;});
  c.cumulMois=cumulMois;
  // Cumul annuel
  var anKey=TD.slice(0,4);
  var clotAn=window.CLOTURES.filter(function(x){return x.date.indexOf(anKey)===0;});
  var cumulAn=totalCA;clotAn.forEach(function(x){cumulAn+=x.totalCA;});
  c.cumulAnnuel=cumulAn;
  c.hash=sha256Sync("Z|"+c.num+"|"+c.date+"|"+c.totalCA.toFixed(2)+"|"+c.totalHT.toFixed(2)+"|"+c.nbTickets+"|"+c.nbAnnul+"|"+_lastTicketHash+"|"+SALON_CONFIG.siret);
  c.hashAlgo="SHA-256";
  sha256Async("Z|"+c.num+"|"+c.date+"|"+c.totalCA.toFixed(2)+"|"+c.totalHT.toFixed(2)+"|"+c.nbTickets+"|"+c.nbAnnul+"|"+_lastTicketHash+"|"+SALON_CONFIG.siret).then(function(h){c.hash=h;});
  window.LOCKED_DAYS[TD]=true;
  window.CLOTURES.push(c);if(typeof saveCloture==="function")saveCloture(c);auditLog("CLOTURE_Z",fmt(TD)+" - Z#"+c.num+" - "+c.nbTickets+" tickets - "+totalCA.toFixed(2)+"E");return c;
}

    },

      remise:a.remise||0,mode:a.met,

    };}),
    annulations:annul.map(function(a){return{
      tkNum:a.tkNum||"",date:a.cancelDate||a.date,
      montant:a.pr,motif:a.cancelMotif||a.cancelReason||"",
      ts:a.cancelTs||""
    };}),
    clotures:clotures.map(function(c){return{
      num:c.num,date:c.date,ts:c.ts,
      nbTickets:c.nbTickets,nbAnnul:c.nbAnnul,
      totalCA:c.totalCA,totalHT:c.totalHT||0,totalTVA:c.totalTVA||0,
      prestations:c.totalPrest||0,produits:c.totalProd||0,
      remises:c.totalRemises||0,
      reglements:c.details,
      hash:c.hash,hashAlgo:c.hashAlgo||""
    };}),
    audit:audit,
    ventesProduits:prodVentes,
    integrite:{
      hashArchive:archiveHash,
      hashAlgo:"SHA-256",
      chainePremierTicket:tickets.length>0?tickets[0].hash:"",
      chaineDernierTicket:tickets.length>0?tickets[tickets.length-1].hash:"",

    }
  };
  
  var json=JSON.stringify(archive,null,2);

function applyTheme(k,c,c2){
  var themes={or:["#c8a84e","#d4b95e"],violet:["#6C5CE7","#a29bfe"],rose:["#c44c7a","#d4689a"],vert:["#00b894","#55efc4"],bleu:["#0984e3","#74b9ff"],orange:["#e17055","#fab1a0"],rosegold:["#b76e79","#d4a0aa"],turquoise:["#00cec9","#81ecec"],prune:["#6c3483","#af7ac5"],noir:["#2d3436","#636e72"]};
  if(!c){var t=themes[k];if(t){c=t[0];c2=t[1];}else{c="#c44c7a";c2="#d4689a";}}
  var css=document.documentElement.style;
  var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  // Update ALL CSS variables
  css.setProperty("--gold",c);css.setProperty("--gold-light",c2);
  css.setProperty("--gold-bg","rgba("+r+","+g+","+b+",.1)");
  css.setProperty("--gold-bg2","rgba("+r+","+g+","+b+",.18)");
  css.setProperty("--accent",c);css.setProperty("--pink",c);
  css.setProperty("--pink-bg","rgba("+r+","+g+","+b+",.15)");
  // Logo
  var logo=document.getElementById("hlogo");
  if(logo)logo.style.background=c;
  // Header date
  var hsmall=document.querySelector(".header small");
  if(hsmall)hsmall.style.color=c;
  // ALL accent buttons
  document.querySelectorAll(".btn.bg").forEach(function(bt){
    bt.style.background=c;bt.style.color="#fff";
    bt.style.boxShadow="0 2px 10px rgba("+r+","+g+","+b+",.35)";
  });
  // Active tabs
  document.querySelectorAll(".tab.on").forEach(function(t){
    t.style.background=c;t.style.color="#fff";
  });
  // Tile icons that use pink
  document.querySelectorAll(".tile .ti").forEach(function(ti){
    ti.style.color=c;
  });
  // Card titles
  document.querySelectorAll(".ct").forEach(function(ct){
    ct.style.color="#fff";
  });
  // Price colors
  document.querySelectorAll(".lp").forEach(function(lp){
    lp.style.color=c;
  });
  SALON_CONFIG.couleurPrimaire=c;
  window._currentTheme=k;
  if(typeof saveSalonConfig==="function")saveSalonConfig();
  go("settings");
}
