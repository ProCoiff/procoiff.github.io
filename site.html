<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Réservation en ligne</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#c8a84e;--gold-l:#e8d994;--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1e;--text:#f5f0e8;--text2:rgba(245,240,232,.6);--text3:rgba(245,240,232,.35);--green:#2d9a5e;--red:#c43838;--f1:'Playfair Display',serif;--f2:'Nunito',sans-serif;--f3:'Cormorant Garamond',serif;--max:900px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--f2);background:var(--bg);color:var(--text);min-height:100vh}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.loading .spin{width:40px;height:40px;border:3px solid rgba(200,168,78,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-page{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;text-align:center;padding:20px}
.error-page h2{font-family:var(--f1);color:var(--gold);font-size:28px}

/* HEADER */
.header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,168,78,.1);position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);z-index:50}
.h-logo{display:flex;align-items:center;gap:12px}
.h-logo img{height:44px;border-radius:10px}
.h-name{font-family:var(--f1);font-size:18px;font-weight:700;color:var(--gold)}
.h-sub{font-size:11px;color:var(--text3);letter-spacing:2px}
.h-links{display:flex;gap:16px}
.h-links a{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);text-decoration:none;padding:8px 14px;border-radius:8px;transition:all .3s}
.h-links a:hover,.h-links a.active{color:var(--gold);background:rgba(200,168,78,.08)}

/* TABS / PAGES */
.page{display:none;max-width:var(--max);margin:0 auto;padding:24px 16px}
.page.active{display:block}
.sec{font-family:var(--f1);font-size:clamp(24px,4vw,36px);font-weight:700;text-align:center;margin-bottom:8px}
.sec-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:32px;max-width:500px;margin-left:auto;margin-right:auto}
.gold-sep{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 20px}

/* CARDS */
.card{background:var(--bg3);border:1px solid rgba(200,168,78,.08);border-radius:14px;padding:18px;margin-bottom:12px;transition:all .3s}
.card:hover{border-color:rgba(200,168,78,.2)}
.card-title{font-family:var(--f1);font-size:16px;font-weight:700;color:var(--gold);margin-bottom:10px}

/* TARIFS */
.tarif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.tarif-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px}
.tarif-item:last-child{border-bottom:none}
.tarif-item .p{font-family:var(--f1);font-weight:700;color:var(--gold)}

/* BOOKING FLOW */
.step{display:none}.step.active{display:block}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.step-num{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.step-title{font-family:var(--f1);font-size:20px;font-weight:700}

/* Service selection */
.svc-card{padding:14px;border-radius:12px;cursor:pointer;border:2px solid rgba(200,168,78,.08);background:var(--bg3);transition:all .3s;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.svc-card:hover{border-color:rgba(200,168,78,.25)}
.svc-card.selected{border-color:var(--gold);background:rgba(200,168,78,.06)}
.svc-card .n{font-weight:700;font-size:14px}.svc-card .d{font-size:12px;color:var(--text3);margin-top:2px}
.svc-card .p{font-family:var(--f1);font-weight:800;font-size:18px;color:var(--gold)}

/* Collab selection */
.collab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.collab-card{text-align:center;padding:20px 12px;border-radius:14px;cursor:pointer;border:2px solid rgba(200,168,78,.08);background:var(--bg3);transition:all .3s}
.collab-card:hover{border-color:rgba(200,168,78,.25)}
.collab-card.selected{border-color:var(--gold);background:rgba(200,168,78,.06)}
.collab-av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:24px;font-weight:800;border:3px solid var(--gold);color:var(--gold);background:rgba(200,168,78,.06)}
.collab-card img.av{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:3px solid var(--gold)}
.collab-name{font-weight:700;font-size:14px}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav button{background:none;border:2px solid rgba(200,168,78,.15);color:var(--gold);padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;font-family:var(--f2)}
.cal-nav button:hover{background:rgba(200,168,78,.08)}
.cal-nav .month{font-family:var(--f1);font-size:18px;font-weight:700;color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
.cal-head{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:1px;padding:8px 0}
.cal-day{padding:10px 4px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;border:2px solid transparent}
.cal-day:hover{background:rgba(200,168,78,.08)}
.cal-day.today{border-color:rgba(200,168,78,.2)}
.cal-day.selected{background:var(--gold);color:#0a0a0a;font-weight:800}
.cal-day.disabled{opacity:.2;pointer-events:none}
.cal-day.off{opacity:.15;pointer-events:none;text-decoration:line-through}

/* Time slots */
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.slot{padding:12px;text-align:center;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;border:2px solid rgba(200,168,78,.1);background:var(--bg3);transition:all .2s}
.slot:hover{border-color:rgba(200,168,78,.3)}
.slot.selected{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.slot.taken{opacity:.2;pointer-events:none;text-decoration:line-through}

/* Form */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.fg input,.fg textarea{padding:14px 16px;border-radius:10px;border:1.5px solid rgba(200,168,78,.15);background:rgba(255,255,255,.04);color:var(--text);font-family:var(--f2);font-size:15px;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--gold)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Buttons */
.btn{display:inline-block;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;font-family:var(--f2);transition:all .3s}
.btn-gold{background:var(--gold);color:#0a0a0a}.btn-gold:hover{background:var(--gold-l);transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid rgba(200,168,78,.2);color:var(--gold)}.btn-outline:hover{background:rgba(200,168,78,.08)}
.btn:disabled{opacity:.3;pointer-events:none}

/* Summary */
.summary{background:rgba(200,168,78,.04);border:2px solid rgba(200,168,78,.15);border-radius:16px;padding:24px;margin:20px 0}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,168,78,.08);font-size:14px}
.summary-row:last-child{border-bottom:none}
.summary-row .v{font-weight:700;color:var(--gold)}

/* Success */
.success-page{text-align:center;padding:60px 20px}
.success-page .ico{font-size:64px;margin-bottom:16px}
.success-page h2{font-family:var(--f1);font-size:28px;color:var(--green);margin-bottom:12px}
.success-page p{font-size:15px;color:var(--text2);line-height:1.7;max-width:500px;margin:0 auto}

/* Footer */
.footer{text-align:center;padding:32px 16px;border-top:1px solid rgba(200,168,78,.08);margin-top:40px}
.footer-name{font-family:var(--f1);font-size:18px;color:var(--gold);margin-bottom:4px}
.footer-info{font-size:12px;color:var(--text3);line-height:1.8}

/* CLIENT ACCOUNT */
.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.auth-box{background:var(--bg3);border:2px solid var(--gold);border-radius:20px;padding:28px 20px;max-width:380px;width:calc(100% - 40px);max-height:85vh;overflow-y:auto}
.auth-box h2{font-family:var(--f1);font-size:24px;color:var(--gold);text-align:center;margin-bottom:6px}
.auth-box .sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px}
.auth-box .err{background:rgba(196,56,56,.1);border:1px solid rgba(196,56,56,.2);color:#f87171;padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-bottom:12px;display:none}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text3)}
.auth-switch a{color:var(--gold);cursor:pointer;font-weight:700}
.auth-box .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:440px){.auth-box .fg-row{grid-template-columns:1fr}}
.auth-box .fg label{font-size:11px}
.auth-box .fg input{padding:12px 14px;font-size:14px}

/* Client dashboard */
.dash-header{display:flex;align-items:center;gap:14px;padding:20px 0;border-bottom:1px solid rgba(200,168,78,.1);margin-bottom:20px}
.dash-avatar{width:56px;height:56px;border-radius:50%;background:var(--gold);color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:22px;font-weight:800;flex-shrink:0}
.dash-name{font-family:var(--f1);font-size:20px;font-weight:700}
.dash-email{font-size:12px;color:var(--text3)}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dash-stat{background:var(--bg3);border:1px solid rgba(200,168,78,.1);border-radius:12px;padding:14px;text-align:center}
.dash-stat .num{font-family:var(--f1);font-size:24px;font-weight:900;color:var(--gold)}
.dash-stat .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.rdv-card{background:var(--bg3);border:1px solid rgba(200,168,78,.08);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.rdv-date{min-width:50px;text-align:center}
.rdv-date .d{font-family:var(--f1);font-size:22px;font-weight:800;color:var(--gold)}
.rdv-date .m{font-size:10px;color:var(--text3);text-transform:uppercase}
.rdv-info{flex:1}.rdv-info .svc{font-weight:700;font-size:14px}.rdv-info .det{font-size:12px;color:var(--text2)}
.rdv-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
.rdv-status.pending{background:rgba(212,138,26,.1);color:#d48a1a}
.rdv-status.confirmed{background:rgba(45,154,94,.1);color:#2d9a5e}
.rdv-status.done{background:rgba(200,168,78,.1);color:var(--gold)}
.rdv-status.cancelled{background:rgba(196,56,56,.1);color:#c43838}
.fid-bar{height:10px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden;margin:8px 0}
.fid-bar .fill{height:100%;border-radius:5px;background:var(--gold);transition:width .5s}

/* BOUTIQUE */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.prod-card{background:var(--bg3);border:1px solid rgba(200,168,78,.08);border-radius:14px;overflow:hidden;transition:all .3s}
.prod-card:hover{border-color:rgba(200,168,78,.25);transform:translateY(-2px)}
.prod-img{width:100%;aspect-ratio:1;background:rgba(200,168,78,.04);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3)}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-body{padding:14px}
.prod-name{font-weight:700;font-size:14px;margin-bottom:2px}
.prod-cat{font-size:11px;color:var(--text3)}
.prod-price{font-family:var(--f1);font-size:20px;font-weight:800;color:var(--gold);margin-top:6px}
.prod-btn{width:100%;margin-top:10px;padding:10px;background:rgba(200,168,78,.08);border:1px solid rgba(200,168,78,.15);color:var(--gold);font-weight:700;font-size:13px;border-radius:8px;cursor:pointer;transition:all .2s}
.prod-btn:hover{background:var(--gold);color:#0a0a0a}
.cart-float{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#0a0a0a;padding:14px 24px;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(200,168,78,.4);z-index:50;display:flex;align-items:center;gap:8px}
.cart-count{background:#0a0a0a;color:var(--gold);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}

/* Responsive */
@media(max-width:600px){.fg-row{grid-template-columns:1fr}.h-links{gap:6px}.h-links a{font-size:10px;padding:6px 10px}.collab-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="authModal"></div>
<div id="root">
  <div class="loading" id="loadingScreen">
    <div class="spin"></div>
    <div style="font-size:14px;color:var(--text3)">Chargement du salon...</div>
  </div>
</div>

<script>
// ============================================================
// COIFFPRO — Site vitrine dynamique
// Lit les données du salon depuis Supabase via l'URL
// ============================================================

// Client state
var CLIENT=null; // logged in client
var CLIENT_RDVS=[];

var SB_URL="https://kxdgjtvrkwugbifgppai.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4ZGdqdHZya3d1Z2JpZmdwcGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDE2NTgsImV4cCI6MjA4ODYxNzY1OH0.J3jVuoHSWA0wXyaWxiRzILEWVNr8hbbgVYg73UEDTuI";
var sb=supabase.createClient(SB_URL,SB_KEY);

// Get salon ID from URL
var params=new URLSearchParams(window.location.search);
var salonId=params.get("s")||params.get("salon");

// State
var SALON={},COLLABS=[],SERVICES=[],PRODUCTS=[],HORAIRES={},SITE_CFG={};
var RDV_EXISTING=[];
var booking={svcId:null,svc:null,collabId:null,collab:null,date:null,time:null};
var calMonth=new Date().getMonth(),calYear=new Date().getFullYear();

// Try to restore client session
loadClientSession();

if(!salonId){showError("Aucun salon sp\u00e9cifi\u00e9. V\u00e9rifiez le lien.");}
else{loadSalon();}

async function loadSalon(){
  try{
    // 1. Salon info
    var r=await sb.from("salons").select("*").eq("id",salonId).limit(1);
    if(r.error){showError("Erreur: "+r.error.message);return;}
    if(!r.data||!r.data[0]){showError("Salon introuvable.");return;}
    var s=r.data[0];
    SALON={id:s.id,nom:s.nom||"Salon",sousTitre:s.sous_titre||"",adresse:s.adresse||"",cp:s.cp||"",ville:s.ville||"",tel:s.telephone||"",email:s.email||"",siret:s.siret||"",logo:s.logo||"",config:s.config||{}};
    document.title=SALON.nom+" — R\u00e9servation en ligne";
    
    // 2. Site config
    var sc=await sb.from("site_config").select("*").eq("salon_id",salonId).limit(1);
    if(sc.data&&sc.data[0]){
      var d=sc.data[0];
      SITE_CFG={actif:d.site_actif,resa:d.reservation_active,boutique:d.boutique_active,
        acompte:d.acompte_obligatoire,acompteMt:Number(d.acompte_montant),acompteType:d.acompte_type,
        acompteMin:Number(d.acompte_min)||0,acompteDesc:d.acompte_description||"",
        politiqueAnnul:d.politique_annulation||"48h",remboursementAnnul:d.remboursement_annulation,
        delaiMin:d.delai_min_heures||2,delaiMax:d.delai_max_jours||30,interval:d.creneau_intervalle||15,
        autoConfirm:d.confirmation_auto,svcOnline:d.services_en_ligne||[],prodOnline:d.produits_en_ligne||[],
        msgAccueil:d.message_accueil||"",msgConfirm:d.message_confirmation||"",
        couleur:d.couleur_primaire||"#c8a84e",couleur2:d.couleur_secondaire||"#0a0a0a",
        theme:d.style_theme||"dark_gold",
        photoHero:d.photo_hero||"",photoSalon:d.photo_salon||"",photosSalon:d.photos_salon||[],descSalon:d.description_salon||"",slogan:d.slogan||"",
        fidActive:d.fidelite_active!==false,fidSeuil:d.fidelite_seuil||10,
        fidType:d.fidelite_type||"pourcentage",fidValeur:Number(d.fidelite_valeur)||10
      };
    }
    // Apply theme colors
    var root=document.documentElement;
    var th=SITE_CFG.theme||"dark_gold";
    var themeMap={
      "dark_gold":  {gold:"#c8a84e",goldL:"#e8d994",bg:"#0a0a0a",bg2:"#111",bg3:"#1a1a1e",text:"#f5f0e8",text2:"rgba(245,240,232,.6)",text3:"rgba(245,240,232,.35)",green:"#2d9a5e",red:"#c43838"},
      "dark_rose":  {gold:"#c44c7a",goldL:"#e06b9a",bg:"#0e0a0c",bg2:"#1a1016",bg3:"#211520",text:"#f5f0f2",text2:"rgba(245,240,242,.6)",text3:"rgba(245,240,242,.35)",green:"#2d9a5e",red:"#c43838"},
      "dark_blue":  {gold:"#64b5f6",goldL:"#90caf9",bg:"#0a0a14",bg2:"#0e1018",bg3:"#141822",text:"#e8eef5",text2:"rgba(232,238,245,.6)",text3:"rgba(232,238,245,.35)",green:"#2d9a5e",red:"#c43838"},
      "light_classic":{gold:"#c8a84e",goldL:"#b8940e",bg:"#f8f6f0",bg2:"#f0ece4",bg3:"#fff",text:"#1a1a2e",text2:"rgba(26,26,46,.6)",text3:"rgba(26,26,46,.4)",green:"#2d7a4e",red:"#b83030"},
      "light_pink": {gold:"#c44c7a",goldL:"#a83060",bg:"#fdf2f8",bg2:"#fce7f3",bg3:"#fff",text:"#1a1a2e",text2:"rgba(26,26,46,.6)",text3:"rgba(26,26,46,.4)",green:"#2d7a4e",red:"#b83030"},
      "light_green":{gold:"#2e7d32",goldL:"#1b5e20",bg:"#f1f8e9",bg2:"#e8f5e9",bg3:"#fff",text:"#1a1a2e",text2:"rgba(26,26,46,.6)",text3:"rgba(26,26,46,.4)",green:"#2e7d32",red:"#b83030"}
    };
    var t=themeMap[th]||themeMap["dark_gold"];
    // Override with custom colors if set
    if(SITE_CFG.couleur&&SITE_CFG.couleur!==t.gold)t.gold=SITE_CFG.couleur;
    if(SITE_CFG.couleur2&&SITE_CFG.couleur2!==t.bg)t.bg=SITE_CFG.couleur2;
    root.style.setProperty('--gold',t.gold);
    root.style.setProperty('--gold-l',t.goldL);
    root.style.setProperty('--bg',t.bg);
    root.style.setProperty('--bg2',t.bg2);
    root.style.setProperty('--bg3',t.bg3);
    root.style.setProperty('--text',t.text);
    root.style.setProperty('--text2',t.text2);
    root.style.setProperty('--text3',t.text3);
    root.style.setProperty('--green',t.green);
    root.style.setProperty('--red',t.red);
    
    // 3. Collaborateurs
    var tc=await sb.from("collaborateurs").select("*").eq("salon_id",salonId);
    if(tc.data)COLLABS=tc.data.map(function(c){return{id:c.id,n:c.nom,i:c.initiales,c:c.couleur,img:c.img||"",hrs:c.horaires||{}};});
    
    // 4. Services
    var sv=await sb.from("services").select("*").eq("salon_id",salonId).order("nom");
    if(sv.data){
      SERVICES=sv.data.map(function(s){return{id:s.id,n:s.nom,p:Number(s.prix),cat:s.categorie,phases:s.phases||[]};});
      // Filter by online config
      if(SITE_CFG.svcOnline&&SITE_CFG.svcOnline.length>0){
        SERVICES=SERVICES.filter(function(s){return SITE_CFG.svcOnline.indexOf(s.id)>=0;});
      }
    }
    
    // 5. Products
    var pr=await sb.from("produits").select("*").eq("salon_id",salonId).order("nom");
    if(pr.data)PRODUCTS=pr.data.map(function(p){return{id:p.id,n:p.nom,p:Number(p.prix),cat:p.categorie,img:p.image||"",stk:p.stock||0,cc:p.click_collect};});
    
    // 6. Existing appointments (next 30 days for availability)
    var today=new Date().toISOString().slice(0,10);
    var maxDate=new Date();maxDate.setDate(maxDate.getDate()+(SITE_CFG.delaiMax||30));
    var ap=await sb.from("appointments").select("date_rdv,heure,collab_id,service_id,status,a_phases").eq("salon_id",salonId).gte("date_rdv",today).lte("date_rdv",maxDate.toISOString().slice(0,10));
    if(ap.data)RDV_EXISTING=ap.data.filter(function(a){return a.status!=="canc";});
    
    // 7. Online RDV (pending/confirmed)
    var ro=await sb.from("rdv_online").select("date_rdv,heure_rdv,collaborateur_id,duree_minutes,status").eq("salon_id",salonId).gte("date_rdv",today);
    if(ro.data){
      ro.data.filter(function(r){return r.status!=="cancelled";}).forEach(function(r){
        RDV_EXISTING.push({date_rdv:r.date_rdv,heure:r.heure_rdv?r.heure_rdv.slice(0,5):null,collab_id:r.collaborateur_id,status:"conf"});
      });
    }
    
    // Horaires from salon config or first collab
    if(SALON.config&&SALON.config.horaires)HORAIRES=SALON.config.horaires;
    else if(COLLABS.length>0&&COLLABS[0].hrs)HORAIRES=COLLABS[0].hrs;
    else HORAIRES={0:null,1:{o:"14:00",c:"18:00"},2:{o:"09:00",c:"18:00"},3:{o:"09:00",c:"18:00"},4:{o:"09:00",c:"18:00"},5:{o:"09:00",c:"18:00"},6:{o:"09:00",c:"16:00"}};
    
    renderSite();
  }catch(e){
    console.error(e);showError("Erreur de chargement: "+e.message);
  }
}

async function hashPassword(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function showAuthModal(mode){
  var isLogin=mode==="login";
  var h='<div class="auth-modal" onclick="closeAuth()">';
  h+='<div class="auth-box" onclick="event.stopPropagation()">';
  h+='<h2>'+(isLogin?"Connexion":"Cr\u00e9er un compte")+'</h2>';
  h+='<div class="sub">'+(isLogin?"Connectez-vous pour r\u00e9server":"Inscrivez-vous pour prendre rendez-vous en ligne")+'</div>';
  h+='<div class="err" id="authErr"></div>';
  if(!isLogin){
    h+='<div class="fg-row"><div class="fg"><label>Nom *</label><input id="aRegNom" required></div>';
    h+='<div class="fg"><label>Pr\u00e9nom</label><input id="aRegPre"></div></div>';
    h+='<div class="fg"><label>T\u00e9l\u00e9phone *</label><input id="aRegTel" type="tel" required></div>';
  }
  h+='<div class="fg"><label>Email *</label><input id="aEmail" type="email" required></div>';
  h+='<div class="fg"><label>Mot de passe *</label><input id="aPass" type="password" required></div>';
  if(!isLogin)h+='<div class="fg"><label>Confirmer le mot de passe *</label><input id="aPass2" type="password" required></div>';
  h+='<button class="btn btn-gold" style="width:100%;padding:16px;font-size:15px;margin-top:12px" onclick="'+(isLogin?'doClientLogin()':'doClientRegister()')+'">'+(isLogin?"Se connecter":"Cr\u00e9er mon compte")+'</button>';
  h+='<div class="auth-switch">'+(isLogin?'Pas encore de compte ? <a onclick="showAuthModal(\'register\')">S\'inscrire</a>':'D\u00e9j\u00e0 un compte ? <a onclick="showAuthModal(\'login\')">Se connecter</a>')+'</div>';
  h+='</div></div>';
  document.getElementById("authModal").innerHTML=h;
}
function closeAuth(){document.getElementById("authModal").innerHTML="";}
function showAuthError(msg){var el=document.getElementById("authErr");if(el){el.textContent=msg;el.style.display="block";}}

async function doClientRegister(){
  var nom=document.getElementById("aRegNom").value.trim();
  var pre=(document.getElementById("aRegPre")||{}).value||"";
  var tel=document.getElementById("aRegTel").value.trim();
  var email=document.getElementById("aEmail").value.trim().toLowerCase();
  var pass=document.getElementById("aPass").value;
  var pass2=document.getElementById("aPass2").value;
  if(!nom||!tel||!email||!pass){showAuthError("Remplissez tous les champs obligatoires");return;}
  if(pass.length<6){showAuthError("Mot de passe : 6 caract\u00e8res minimum");return;}
  if(pass!==pass2){showAuthError("Les mots de passe ne correspondent pas");return;}
  var hash=await hashPassword(pass);
  // Check if email already exists
  var check=await sb.from("clients_online").select("id").eq("salon_id",salonId).eq("email",email);
  if(check.data&&check.data.length>0){showAuthError("Un compte existe d\u00e9j\u00e0 avec cet email");return;}
  var r=await sb.from("clients_online").insert({
    salon_id:salonId,email:email,password_hash:hash,
    nom:nom,prenom:pre.trim(),telephone:tel
  }).select();
  if(r.error){showAuthError(r.error.message);return;}
  if(r.data&&r.data[0]){
    CLIENT=r.data[0];
    saveClientSession();
    closeAuth();
    renderSite();
  }
}

async function doClientLogin(){
  var email=document.getElementById("aEmail").value.trim().toLowerCase();
  var pass=document.getElementById("aPass").value;
  if(!email||!pass){showAuthError("Remplissez email et mot de passe");return;}
  var hash=await hashPassword(pass);
  var r=await sb.from("clients_online").select("*").eq("salon_id",salonId).eq("email",email).eq("password_hash",hash);
  if(!r.data||r.data.length===0){showAuthError("Email ou mot de passe incorrect");return;}
  CLIENT=r.data[0];
  // Update last login
  sb.from("clients_online").update({last_login:new Date().toISOString()}).eq("id",CLIENT.id);
  saveClientSession();
  closeAuth();
  renderSite();
}

function doClientLogout(){
  CLIENT=null;CLIENT_RDVS=[];
  try{sessionStorage.removeItem("cp_client");}catch(e){}
  renderSite();
}

function saveClientSession(){
  try{sessionStorage.setItem("cp_client",JSON.stringify({id:CLIENT.id,email:CLIENT.email,nom:CLIENT.nom,prenom:CLIENT.prenom,telephone:CLIENT.telephone,points_fidelite:CLIENT.points_fidelite,total_visites:CLIENT.total_visites}));}catch(e){}
}
function loadClientSession(){
  try{var d=sessionStorage.getItem("cp_client");if(d){CLIENT=JSON.parse(d);return true;}}catch(e){}
  return false;
}

async function loadClientRDVs(){
  if(!CLIENT)return;
  var r=await sb.from("rdv_online").select("*").eq("salon_id",salonId).eq("client_online_id",CLIENT.id).order("date_rdv",{ascending:false});
  if(r.data)CLIENT_RDVS=r.data;
  // Also load by email as fallback
  var r2=await sb.from("rdv_online").select("*").eq("salon_id",salonId).eq("client_email",CLIENT.email).order("date_rdv",{ascending:false});
  if(r2.data){
    r2.data.forEach(function(rdv){
      var exists=false;for(var i=0;i<CLIENT_RDVS.length;i++){if(CLIENT_RDVS[i].id===rdv.id){exists=true;break;}}
      if(!exists)CLIENT_RDVS.push(rdv);
    });
  }
}

function showPage(id){

function renderBookingStep1(){
  booking={svcId:null,svc:null,collabId:null,collab:null,date:null,time:null};
  var h='<div class="step active">';
  h+='<div class="step-header"><div class="step-num">1</div><div class="step-title">Choisissez une prestation</div></div>';
  // Group by cat
  var cats={};SERVICES.forEach(function(s){if(!cats[s.cat])cats[s.cat]=[];cats[s.cat].push(s);});

    h+='<div style="font-size:12px;font-weight:800;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:16px 0 8px">'+cat+'</div>';

      var dur=0;if(s.phases)s.phases.forEach(function(p){dur+=p.d;});
      h+='<div class="svc-card" onclick="selectService('+s.id+')">';

      h+='<div class="p">'+s.p+' \u20ac</div></div>';
    });
  }
  h+='</div>';
  document.getElementById("bookingFlow").innerHTML=h;
}

function selectService(svcId){
  var svc=null;for(var i=0;i<SERVICES.length;i++){if(SERVICES[i].id===svcId){svc=SERVICES[i];break;}}
  if(!svc)return;
  booking.svcId=svcId;booking.svc=svc;
  // Duration
  var dur=0;if(svc.phases)svc.phases.forEach(function(p){dur+=p.d;});
  booking.duration=dur||30;
  renderBookingStep2();
}

  h+='<div class="collab-grid">';
  // No preference option
  h+='<div class="collab-card" onclick="selectCollab(null)"><div class="collab-av">\ud83d\udc87</div><div class="collab-name">Pas de pr\u00e9f\u00e9rence</div></div>';
  for(var i=0;i<COLLABS.length;i++){
    var c=COLLABS[i];

    h+='<div class="collab-name">'+c.n+'</div></div>';
  }
  h+='</div>';
  h+='<div style="margin-top:16px"><button class="btn btn-outline" onclick="renderBookingStep1()">\u25c0 Retour</button></div>';
  h+='</div>';

}

function selectCollab(collabId){
  booking.collabId=collabId;
  booking.collab=null;
  if(collabId){for(var i=0;i<COLLABS.length;i++){if(COLLABS[i].id===collabId){booking.collab=COLLABS[i];break;}}}
  calMonth=new Date().getMonth();calYear=new Date().getFullYear();
  renderBookingStep3();
}

function renderBookingStep3(){
  var h='<div class="step active">';
  h+='<div class="step-header"><div class="step-num">3</div><div class="step-title">Choisissez une date</div></div>';
  h+=renderCalendar();
  h+='<div id="timeSlotsArea"></div>';
  h+='<div style="margin-top:16px"><button class="btn btn-outline" onclick="renderBookingStep2()">\u25c0 Retour</button></div>';
  h+='</div>';
  document.getElementById("bookingFlow").innerHTML=h;
}

function renderCalendar(){
  var h='<div class="cal-nav">';
  h+='<button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderBookingStep3()">\u25c0</button>';
  var mNames=["Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin","Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
  h+='<div class="month">'+mNames[calMonth]+' '+calYear+'</div>';
  h+='<button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderBookingStep3()">\u25b6</button>';
  h+='</div>';
  h+='<div class="cal-grid">';
  ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].forEach(function(d){h+='<div class="cal-head">'+d+'</div>';});
  var first=new Date(calYear,calMonth,1);
  var startDow=(first.getDay()+6)%7;// Monday=0
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);
  var maxDate=new Date();maxDate.setDate(maxDate.getDate()+(SITE_CFG.delaiMax||30));
  for(var i=0;i<startDow;i++)h+='<div></div>';
  for(var d=1;d<=daysInMonth;d++){
    var dt=new Date(calYear,calMonth,d);
    var dow=dt.getDay();
    var hrs=HORAIRES[dow];
    // Check if collab works this day
    if(booking.collab&&booking.collab.hrs){hrs=booking.collab.hrs[dow];}
    var isPast=dt<today;
    var isTooFar=dt>maxDate;
    var isClosed=!hrs;
    var isToday=dt.getTime()===today.getTime();
    var isSelected=booking.date&&booking.date===formatDate(dt);
    var cls="cal-day";
    if(isToday)cls+=" today";
    if(isSelected)cls+=" selected";
    if(isPast||isTooFar)cls+=" disabled";
    if(isClosed)cls+=" off";
    h+='<div class="'+cls+'" onclick="selectDate(\''+formatDate(dt)+'\')">'+d+'</div>';
  }
  h+='</div>';
  return h;
}

function formatDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function selectDate(dateStr){
  booking.date=dateStr;booking.time=null;
  renderBookingStep3();
  // Render time slots
  var dt=new Date(dateStr);
  var dow=dt.getDay();
  var hrs=HORAIRES[dow];
  if(booking.collab&&booking.collab.hrs)hrs=booking.collab.hrs[dow];
  if(!hrs){document.getElementById("timeSlotsArea").innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Ferm\u00e9 ce jour</div>';return;}
  
  var interval=SITE_CFG.interval||15;
  var startM=toMin(hrs.o),endM=toMin(hrs.c);
  var dur=booking.duration||30;
  var slots=[];
  for(var m=startM;m+dur<=endM;m+=interval){
    var timeStr=fromMin(m);
    var isTaken=isSlotTaken(dateStr,timeStr,dur,booking.collabId);
    slots.push({time:timeStr,taken:isTaken});
  }
  
  // Check min delay
  var now=new Date();
  var minDelay=(SITE_CFG.delaiMin||2)*60;// minutes
  
  var h='<div style="margin-top:20px"><div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px">Cr\u00e9neaux disponibles :</div>';
  h+='<div class="slots-grid">';
  var hasAvailable=false;
  for(var i=0;i<slots.length;i++){
    var s=slots[i];
    // Check if too soon
    var slotDt=new Date(dateStr+"T"+s.time);
    var diffMin=(slotDt-now)/60000;
    var tooSoon=diffMin<minDelay;
    var cls="slot"+(s.taken||tooSoon?" taken":"");
    if(!s.taken&&!tooSoon)hasAvailable=true;
    h+='<div class="'+cls+'" onclick="selectTime(\''+s.time+'\')">'+s.time+'</div>';
  }
  if(!hasAvailable)h+='<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text3)">Aucun cr\u00e9neau disponible ce jour</div>';
  h+='</div></div>';
  document.getElementById("timeSlotsArea").innerHTML=h;
}

function isSlotTaken(date,time,duration,collabId){
  var slotStart=toMin(time),slotEnd=slotStart+duration;
  for(var i=0;i<RDV_EXISTING.length;i++){
    var r=RDV_EXISTING[i];
    if(r.date_rdv!==date)continue;
    if(collabId&&r.collab_id&&r.collab_id!==collabId)continue;// Different collab
    if(!r.heure)continue;
    var rStart=toMin(r.heure);
    // Estimate duration from phases or default 60min
    var rDur=60;
    if(r.a_phases){var td=0;r.a_phases.forEach(function(p){td+=p.d||0;});if(td>0)rDur=td;}
    var rEnd=rStart+rDur;
    if(slotStart<rEnd&&slotEnd>rStart)return true;// Overlap
  }
  return false;
}

function selectTime(time){
  booking.time=time;
  renderBookingStep4();
}

  h+='<div class="fg"><label>Message (optionnel)</label><textarea id="bkMsg" rows="2" placeholder="Pr\u00e9cisions, souhaits..."></textarea></div>';
  
  h+='<div style="display:flex;gap:10px;margin-top:16px">';

  h+='<button class="btn btn-gold" style="flex:1" onclick="submitBooking()">Confirmer le rendez-vous</button>';

async function submitBooking(){
  var nom=document.getElementById("bkNom").value.trim();
  var tel=document.getElementById("bkTel").value.trim();
  if(!nom||!tel){alert("Nom et t\u00e9l\u00e9phone obligatoires");return;}
  var pre=document.getElementById("bkPre").value.trim();
  var email=document.getElementById("bkEmail").value.trim();
  var msg=document.getElementById("bkMsg").value.trim();
  
  var dur=booking.duration||30;
  var acompte=0;
  if(SITE_CFG.acompte){acompte=SITE_CFG.acompteType==="pourcentage"?Math.round(booking.svc.p*SITE_CFG.acompteMt/100):SITE_CFG.acompteMt;}
  
  var data={
    salon_id:salonId,
    client_nom:nom,client_prenom:pre,client_tel:tel,client_email:email,
    client_online_id:CLIENT?CLIENT.id:null,
    service_id:booking.svcId,service_nom:booking.svc.n,service_prix:booking.svc.p,
    collaborateur_id:booking.collabId,collaborateur_nom:booking.collab?booking.collab.n:null,
    date_rdv:booking.date,heure_rdv:booking.time,duree_minutes:dur,
    acompte_montant:acompte,status:SITE_CFG.autoConfirm?"confirmed":"pending",
    message:msg
  };
  
  try{
    var r=await sb.from("rdv_online").insert(data).select();
    if(r.error){alert("Erreur: "+r.error.message);return;}
    // Success
    var confirmMsg=SITE_CFG.msgConfirm||"Votre demande a bien \u00e9t\u00e9 envoy\u00e9e.";
    var h='<div class="success-page">';
    h+='<div class="ico">\u2705</div>';
    h+='<h2>'+(SITE_CFG.autoConfirm?"Rendez-vous confirm\u00e9 !":"Demande envoy\u00e9e !")+'</h2>';
    h+='<p>'+confirmMsg+'</p>';
    h+='<div class="summary" style="max-width:400px;margin:20px auto">';
    h+='<div class="summary-row"><span>Prestation</span><span class="v">'+booking.svc.n+'</span></div>';
    h+='<div class="summary-row"><span>Date</span><span class="v">'+formatDateFR(booking.date)+' \u00e0 '+booking.time+'</span></div>';
    if(booking.collab)h+='<div class="summary-row"><span>Avec</span><span class="v">'+booking.collab.n+'</span></div>';
    h+='</div>';
    h+='<button class="btn btn-gold" onclick="renderBookingStep1()" style="margin-top:16px">Nouveau rendez-vous</button>';
    h+='</div>';
    document.getElementById("bookingFlow").innerHTML=h;
  }catch(e){
    alert("Erreur: "+e.message);
  }
}

// CART / BOUTIQUE
// ============================================================
var CART=[];

function addToCart(prodId){
  var prod=null;for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id===prodId){prod=PRODUCTS[i];break;}}
  if(!prod)return;
  var existing=null;for(var i=0;i<CART.length;i++){if(CART[i].id===prodId){existing=CART[i];break;}}
  if(existing){existing.qty++;}
  else{CART.push({id:prod.id,n:prod.n,p:prod.p,qty:1,cat:prod.cat});}
  updateCartBadge();
  // Toast
  var toast=document.createElement("div");
  toast.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0a0a;padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(200,168,78,.3)";
  toast.textContent="\u2705 "+prod.n+" ajout\u00e9 au panier";
  document.body.appendChild(toast);
  setTimeout(function(){toast.remove();},2000);
}

function updateCartBadge(){
  var total=0;CART.forEach(function(c){total+=c.qty;});
  var el=document.getElementById("cartFloat");
  var cnt=document.getElementById("cartCount");
  if(el){el.style.display=total>0?"flex":"none";}
  if(cnt)cnt.textContent=total;
}

function showCart(){
  if(!CART.length){alert("Votre panier est vide");return;}
  var total=0;CART.forEach(function(c){total+=c.p*c.qty;});
  var h='<div class="auth-modal" onclick="closeCart()">';
  h+='<div class="auth-box" onclick="event.stopPropagation()" style="max-width:450px">';
  h+='<h2>\ud83d\uded2 Mon panier</h2>';
  for(var i=0;i<CART.length;i++){
    var c=CART[i];
    h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)">';
    h+='<div style="flex:1"><div style="font-weight:700;font-size:14px">'+c.n+'</div><div style="font-size:12px;color:var(--text3)">'+c.cat+'</div></div>';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<button onclick="cartQty('+i+',-1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--text);cursor:pointer;font-size:16px">\u2212</button>';
    h+='<span style="font-weight:700;min-width:20px;text-align:center">'+c.qty+'</span>';
    h+='<button onclick="cartQty('+i+',1)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--text);cursor:pointer;font-size:16px">+</button>';
    h+='</div>';
    h+='<div style="font-family:var(--f1);font-weight:700;color:var(--gold);min-width:60px;text-align:right">'+(c.p*c.qty).toFixed(2)+' \u20ac</div>';
    h+='</div>';
  }
  h+='<div style="display:flex;justify-content:space-between;padding:14px 0;font-size:18px;font-weight:800;border-top:2px solid var(--gold);margin-top:8px"><span>Total</span><span style="color:var(--gold)">'+total.toFixed(2)+' \u20ac</span></div>';
  h+='<button class="btn btn-gold" style="width:100%;padding:14px;font-size:15px;margin-top:12px" onclick="submitOrder()">Commander (retrait au salon)</button>';
  h+='<button class="btn btn-outline" style="width:100%;padding:10px;font-size:13px;margin-top:8px" onclick="closeCart()">Continuer mes achats</button>';
  h+='</div></div>';
  document.getElementById("authModal").innerHTML=h;
}

function closeCart(){document.getElementById("authModal").innerHTML="";}

function cartQty(idx,delta){
  CART[idx].qty+=delta;
  if(CART[idx].qty<=0)CART.splice(idx,1);
  updateCartBadge();
  if(CART.length)showCart();else closeCart();
}

async function submitOrder(){
  if(!CLIENT){showAuthModal("login");return;}
  var total=0;var items=[];
  CART.forEach(function(c){total+=c.p*c.qty;items.push({produit_id:c.id,nom:c.n,prix:c.p,qty:c.qty});});
  var data={
    salon_id:salonId,
    client_nom:CLIENT.nom+(CLIENT.prenom?" "+CLIENT.prenom:""),
    client_tel:CLIENT.telephone||"",
    client_email:CLIENT.email,
    items:items,total:total,
    status:"pending"
  };
  var r=await sb.from("commandes_online").insert(data).select();
  if(r.error){alert("Erreur: "+r.error.message);return;}
  CART=[];updateCartBadge();
  var h='<div class="auth-modal" onclick="closeCart()">';
  h+='<div class="auth-box" onclick="event.stopPropagation()" style="text-align:center">';
  h+='<div style="font-size:48px;margin-bottom:12px">\u2705</div>';
  h+='<h2 style="color:var(--green)">Commande envoy\u00e9e !</h2>';
  h+='<p style="color:var(--text2);margin-top:8px">Votre commande de '+total.toFixed(2)+' \u20ac a \u00e9t\u00e9 transmise au salon. Nous vous pr\u00e9viendrons quand elle sera pr\u00eate \u00e0 retirer.</p>';
  h+='<button class="btn btn-gold" style="margin-top:16px;padding:12px 32px" onclick="closeCart()">Fermer</button>';
  h+='</div></div>';
  document.getElementById("authModal").innerHTML=h;
}

// Helpers
function toMin(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function fromMin(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}
function formatDateFR(ds){if(!ds)return"";var p=ds.split("-");var dt=new Date(p[0],p[1]-1,p[2]);var jours=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];var mois=["janvier","f\u00e9vrier","mars","avril","mai","juin","juillet","ao\u00fbt","septembre","octobre","novembre","d\u00e9cembre"];return jours[dt.getDay()]+" "+p[2]+" "+mois[dt.getMonth()]+" "+p[0];}
</script>
