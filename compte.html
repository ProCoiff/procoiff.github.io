<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon compte – BeautyPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0d0d14;--card:#12121c;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--text:#f5f5f7;--text2:#a0a0b0;--text3:#606070;--gold:#c8a84e;--gold-bg:rgba(200,168,78,.08);--gold2:rgba(200,168,78,.15);--green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;--r:14px;--f1:'DM Sans',sans-serif;--f2:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50}
.logo{font-family:var(--f2);font-size:18px;font-weight:900;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:6px}
.logo svg{flex-shrink:0}
.container{max-width:560px;margin:0 auto;padding:20px 16px 60px}

/* AUTH FORMS */
.auth-page{max-width:420px;margin:40px auto;padding:0 16px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px}
.auth-card h1{font-family:var(--f2);font-size:26px;font-weight:900;margin-bottom:4px}
.auth-card .sub{font-size:14px;color:var(--text3);margin-bottom:24px}
.fg{margin-bottom:14px}
.fg label{font-size:12px;font-weight:600;color:var(--text3);display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--f1);outline:none;transition:border .2s}
.fg input:focus{border-color:var(--gold)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--f1);transition:all .2s;width:100%;text-align:center;display:block}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:#d4b45e}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text)}
.btn-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.err{display:none;background:rgba(248,113,113,.1);color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px}
.consent{padding:10px 0;border-top:1px solid var(--border)}
.consent label{font-size:13px;display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;color:var(--text2)}

/* DASHBOARD */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-color:var(--gold)}
.section{margin-bottom:24px}
.section-title{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* RDV LIST */
.rdv-item{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.rdv-item:last-child{border:none}
.rdv-date{text-align:center;min-width:48px}
.rdv-date .d{font-size:22px;font-weight:900;line-height:1}
.rdv-date .m{font-size:11px;color:var(--text3);text-transform:uppercase}
.rdv-info{flex:1}
.rdv-svc{font-weight:700;font-size:14px}
.rdv-det{font-size:12px;color:var(--text2);margin-top:2px}
.rdv-salon{font-size:11px;color:var(--gold);margin-top:2px}
.rdv-status{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.st-pending{background:rgba(251,146,60,.12);color:var(--orange)}
.st-confirmed{background:rgba(74,222,128,.12);color:var(--green)}
.st-done{background:rgba(96,165,250,.12);color:var(--blue)}
.st-cancelled{background:rgba(248,113,113,.12);color:var(--red)}

/* PROFILE */
.avatar-area{text-align:center;margin-bottom:20px}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;margin:0 auto 8px;font-family:var(--f2)}
.user-name{font-size:18px;font-weight:800}
.user-email{font-size:13px;color:var(--text3)}

/* SETTINGS ROW */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:14px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text3);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:22px}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty .ico{font-size:40px;margin-bottom:8px}

.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);margin-top:20px}

@media(max-width:440px){.fg-row{grid-template-columns:1fr}.auth-card{padding:24px 16px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
var SB_URL="https://kxdgjtvrkwugbifgppai.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4ZGdqdHZya3d1Z2JpZmdwcGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDE2NTgsImV4cCI6MjA4ODYxNzY1OH0.J3jVuoHSWA0wXyaWxiRzILEWVNr8hbbgVYg73UEDTuI";

async function sha256(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
function api(path,opts){return fetch(SB_URL+"/rest/v1/"+path,Object.assign({headers:HDR},opts||{}));}

// Session
function saveSession(){try{localStorage.setItem("bp_account",JSON.stringify(CLIENT));}catch(e){}}

loadSession();

// ========== RENDER ==========
function render(){
  var h='';
  // Topbar
  h+='<div class="topbar">';
  h+='<a href="marketplace.html" class="logo"><svg width="22" height="22" viewBox="0 0 32 32"><circle cx="16" cy="16" r="15" fill="none" stroke="#c8a84e" stroke-width="1.5"/><text x="16" y="21" text-anchor="middle" font-family="serif" font-size="18" font-weight="900" fill="#c8a84e">B</text></svg>BeautyPro</a>';

    h+='<button onclick="logout()" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);font-size:12px;cursor:pointer">D\u00e9connexion</button>';
  }
  h+='</div>';
  
  if(PAGE==="login")h+=renderLogin();
  else if(PAGE==="register")h+=renderRegister();
  else if(PAGE==="dashboard")h+=renderDashboard();
  
  h+='<div class="footer">BeautyPro \u00a9 2026 \u2014 Tous droits r\u00e9serv\u00e9s</div>';
  document.getElementById("root").innerHTML=h;
}

// ========== LOGIN ==========
function renderLogin(){
  var h='<div class="auth-page"><div class="auth-card">';
  h+='<h1>Connexion</h1>';
  h+='<div class="sub">Connectez-vous \u00e0 votre compte BeautyPro</div>';
  h+='<div class="err" id="loginErr"></div>';
  h+='<div class="fg"><label>Email</label><input id="lEmail" type="email" placeholder="votre@email.fr"></div>';
  h+='<div class="fg"><label>Mot de passe</label><input id="lPass" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" onkeydown="if(event.key===\'Enter\')doLogin()"></div>';

// ========== DASHBOARD ==========
function renderDashboard(){
  if(!CLIENT)return'';
  var initials=(CLIENT.prenom?CLIENT.prenom[0]:"")+(CLIENT.nom?CLIENT.nom[0]:"");
  var h='<div class="container">';
  
  // Avatar
  h+='<div class="avatar-area"><div class="avatar">'+initials.toUpperCase()+'</div>';
  h+='<div class="user-name">'+(CLIENT.prenom||"")+' '+(CLIENT.nom||"")+'</div>';
  h+='<div class="user-email">'+CLIENT.email+'</div></div>';
  
  // Tabs
  h+='<div class="tab-bar">';
  h+='<div class="tab'+(TAB==="rdv"?" active":"")+'" onclick="TAB=\'rdv\';render()">\ud83d\udcc5 Mes RDV</div>';
  h+='<div class="tab'+(TAB==="profile"?" active":"")+'" onclick="TAB=\'profile\';render()">\ud83d\udc64 Profil</div>';
  h+='<div class="tab'+(TAB==="settings"?" active":"")+'" onclick="TAB=\'settings\';render()">\u2699\ufe0f R\u00e9glages</div>';
  h+='</div>';
  
  if(TAB==="rdv")h+=renderRdvTab();
  else if(TAB==="profile")h+=renderProfileTab();
  else if(TAB==="settings")h+=renderSettingsTab();
  
  h+='</div>';
  return h;
}

// --- RDV TAB ---
function renderRdvTab(){
  var h='';
  var mois=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var stLabels={pending:"En attente",confirmed:"Confirm\u00e9",done:"Termin\u00e9",cancelled:"Annul\u00e9"};
  var stClasses={pending:"st-pending",confirmed:"st-confirmed",done:"st-done",cancelled:"st-cancelled"};
  
  var today=new Date().toISOString().slice(0,10);
  var upcoming=CLIENT_RDVS.filter(function(r){return r.date_rdv>=today&&r.status!=="cancelled";});
  var past=CLIENT_RDVS.filter(function(r){return (r.date_rdv<today&&r.status!=="cancelled")||r.status==="done";});
  var cancelled=CLIENT_RDVS.filter(function(r){return r.status==="cancelled";});
  
  // --- UPCOMING ---
  h+='<div class="section"><div class="section-title">\ud83d\udcc5 \u00c0 venir ('+upcoming.length+')</div>';
  if(upcoming.length){
    upcoming.forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:8px">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+(r.collaborateur_nom||"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+(stClasses[r.status]||"")+'">'+(stLabels[r.status]||r.status)+'</div>';
      h+='</div>';
      // Modification pending notice
      if(r.modification_demandee&&r.modification_status==="pending"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(251,146,60,.08);border-radius:8px;font-size:12px;color:var(--orange)">\u270f\ufe0f Modification demand\u00e9e \u2192 '+r.modification_date+' \u00e0 '+r.modification_heure+' \u2014 <em>En attente de confirmation</em></div>';
      }
      if(r.modification_status==="accepted"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(74,222,128,.08);border-radius:8px;font-size:12px;color:var(--green)">\u2705 Modification accept\u00e9e par le salon</div>';
      }
      if(r.modification_status==="refused"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(248,113,113,.08);border-radius:8px;font-size:12px;color:var(--red)">\u274c Modification refus\u00e9e par le salon</div>';
      }
      // Action buttons
      var canModify=!r.modification_demandee||r.modification_status!=="pending";
      h+='<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">';
      h+='<button onclick="showModifyRdv(\''+r.id+'\',\''+r.salon_id+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--gold2);background:var(--gold-bg);color:var(--gold);font-size:12px;font-weight:700;cursor:'+(canModify?"pointer":"not-allowed")+';opacity:'+(canModify?"1":".4")+'"'+(canModify?"":' disabled')+'>\u270f\ufe0f Modifier</button>';
      h+='<button onclick="showCancelRdv(\''+r.id+'\',\''+r.salon_id+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(248,113,113,.15);background:rgba(248,113,113,.06);color:var(--red);font-size:12px;font-weight:700;cursor:pointer">\u274c Annuler</button>';
      h+='</div></div>';
    });
  } else {
    h+='<div class="empty"><div class="ico">\ud83d\udcc5</div>Aucun rendez-vous \u00e0 venir<br><a href="marketplace.html" style="font-size:13px">Trouver un salon</a></div>';
  }
  h+='</div>';
  
  // --- PAST (with invoice) ---
  if(past.length){
    h+='<div class="section"><div class="section-title">\ud83d\udcdc Historique ('+past.length+')</div>';
    past.slice(0,15).forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:6px;opacity:.8">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+(stClasses[r.status]||"")+'">'+(stLabels[r.status]||r.status)+'</div>';
      h+='</div>';
      if(r.status==="done"||r.status==="confirmed"){
        h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);text-align:right">';
        h+='<button onclick="downloadReceipt(\''+r.id+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">\ud83d\udcc4 T\u00e9l\u00e9charger le re\u00e7u</button>';
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  
  // --- CANCELLED ---
  if(cancelled.length){
    h+='<div class="section"><div class="section-title" style="color:var(--red)">\u274c Annul\u00e9s ('+cancelled.length+')</div>';
    cancelled.slice(0,5).forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:6px;opacity:.4">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc" style="text-decoration:line-through">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+(r.salon_nom||"")+'</div></div>';
      h+='<div class="rdv-status st-cancelled">Annul\u00e9</div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  
  return h;
}

// --- PROFILE TAB ---
function renderProfileTab(){
  var h='<div class="section"><div class="section-title">\ud83d\udc64 Informations personnelles</div><div class="card">';
  h+='<div class="fg-row"><div class="fg"><label>Nom</label><input id="pNom" value="'+(CLIENT.nom||"")+'"></div>';
  h+='<div class="fg"><label>Pr\u00e9nom</label><input id="pPre" value="'+(CLIENT.prenom||"")+'"></div></div>';

  h+='<div class="fg"><label>Date de naissance</label><input id="pDdn" type="date" value="'+(CLIENT.date_naissance||"")+'"></div></div>';
  h+='<div class="fg"><label>Email</label><input id="pEmail" value="'+CLIENT.email+'" disabled style="opacity:.5"></div>';
  h+='<div style="font-size:11px;color:var(--text3);margin-bottom:12px">Pour changer d\u0027email, contactez le support.</div>';
  h+='<button class="btn btn-gold" onclick="saveProfile()">Enregistrer les modifications</button>';
  h+='<div id="profileMsg" style="display:none;text-align:center;margin-top:8px;font-size:13px"></div>';
  h+='</div></div>';
  
  // Change password
  h+='<div class="section"><div class="section-title">\ud83d\udd12 Changer le mot de passe</div><div class="card">';
  h+='<div class="fg"><label>Mot de passe actuel</label><input id="pOldPass" type="password"></div>';
  h+='<div class="fg"><label>Nouveau mot de passe</label><input id="pNewPass" type="password"></div>';
  h+='<div class="fg"><label>Confirmer</label><input id="pNewPass2" type="password"></div>';
  h+='<button class="btn btn-outline" onclick="changePassword()">Modifier le mot de passe</button>';
  h+='<div id="passMsg" style="display:none;text-align:center;margin-top:8px;font-size:13px"></div>';
  h+='</div></div>';
  
  return h;
}

// --- SETTINGS TAB ---
function renderSettingsTab(){
  var h='';
  // Notifications
  h+='<div class="section"><div class="section-title">\ud83d\udd14 Notifications</div><div class="card">';

// ========== AUTH ACTIONS ==========
async function doLogin(){
  var email=document.getElementById("lEmail").value.trim().toLowerCase();
  var pass=document.getElementById("lPass").value;
  if(!email||!pass){showErr("loginErr","Remplissez email et mot de passe");return;}
  var hash=await sha256(pass);
  try{
    var r=await api("clients_beautypro?select=*&email=eq."+encodeURIComponent(email));
    var data=await r.json();
    if(!Array.isArray(data)||!data.length){showErr("loginErr","Aucun compte avec cet email");return;}
    if(data[0].password_hash!==hash){showErr("loginErr","Mot de passe incorrect");return;}
    CLIENT=data[0];PAGE="dashboard";TAB="rdv";
    api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({last_login:new Date().toISOString()})});
    saveSession();loadMyRdvs();render();
  }catch(e){showErr("loginErr","Erreur r\u00e9seau");}
}

async function doRegister(){
  var nom=document.getElementById("rNom").value.trim();
  var pre=document.getElementById("rPre").value.trim();
  var tel=document.getElementById("rTel").value.trim();
  var ddn=document.getElementById("rDdn").value;
  var genre=document.getElementById("rGenre").value;
  var email=document.getElementById("rEmail").value.trim().toLowerCase();
  var pass=document.getElementById("rPass").value;
  var pass2=document.getElementById("rPass2").value;
  var cgu=document.getElementById("rCgu").checked;
  if(!nom||!pre||!tel||!email||!pass){showErr("regErr","Remplissez tous les champs obligatoires");return;}
  if(!cgu){showErr("regErr","Vous devez accepter les CGU");return;}
  if(pass.length<6){showErr("regErr","Mot de passe : 6 caract\u00e8res minimum");return;}
  if(pass!==pass2){showErr("regErr","Les mots de passe ne correspondent pas");return;}
  var hash=await sha256(pass);
  var smsOk=document.getElementById("rSms").checked;
  var emOk=document.getElementById("rEm").checked;
  try{
    var check=await api("clients_beautypro?select=id&email=eq."+encodeURIComponent(email));
    var ex=await check.json();
    if(ex&&ex.length){showErr("regErr","Un compte existe d\u00e9j\u00e0. Connectez-vous.");return;}
    var r=await fetch(SB_URL+"/rest/v1/clients_beautypro",{method:"POST",headers:Object.assign({},HDR,{"Prefer":"return=representation"}),body:JSON.stringify({email:email,password_hash:hash,nom:nom.toUpperCase(),prenom:pre,telephone:tel,date_naissance:ddn||null,genre:genre,sms_ok:smsOk,email_ok:emOk})});
    var data=await r.json();
    if(Array.isArray(data)&&data.length)CLIENT=data[0];
    else if(data&&data.id)CLIENT=data;
    else{showErr("regErr","Erreur lors de la cr\u00e9ation");return;}
    PAGE="dashboard";TAB="rdv";saveSession();render();
  }catch(e){showErr("regErr","Erreur r\u00e9seau: "+e.message);}
}

async function changePassword(){
  var old=document.getElementById("pOldPass").value;
  var nw=document.getElementById("pNewPass").value;
  var nw2=document.getElementById("pNewPass2").value;
  if(!old||!nw){showMsg("passMsg","Remplissez tous les champs","var(--red)");return;}
  if(nw.length<6){showMsg("passMsg","6 caract\u00e8res minimum","var(--red)");return;}
  if(nw!==nw2){showMsg("passMsg","Les mots de passe ne correspondent pas","var(--red)");return;}
  var oldHash=await sha256(old);
  if(oldHash!==CLIENT.password_hash){showMsg("passMsg","Mot de passe actuel incorrect","var(--red)");return;}
  var newHash=await sha256(nw);
  await api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({password_hash:newHash})});
  CLIENT.password_hash=newHash;saveSession();
  showMsg("passMsg","\u2705 Mot de passe modifi\u00e9","var(--green)");
  document.getElementById("pOldPass").value="";document.getElementById("pNewPass").value="";document.getElementById("pNewPass2").value="";
}

function toggleNotif(el,field){
  var isOn=el.classList.contains("on");
  el.classList.toggle("on");
  CLIENT[field]=!isOn;saveSession();
  var body={};body[field]=!isOn;
  api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify(body)});
}

async function loadMyRdvs(){
  if(!CLIENT)return;
  try{
    // Get RDVs with salon name
    var r=await api("rdv_online?select=*,salons(nom)&client_beautypro_id=eq."+CLIENT.id+"&order=date_rdv.desc&limit=50");
    var data=await r.json();
    if(Array.isArray(data)){
      CLIENT_RDVS=data.map(function(d){d.salon_nom=d.salons?d.salons.nom:"";return d;});
    }
    // Fallback by email
    var r2=await api("rdv_online?select=*,salons(nom)&client_email=eq."+encodeURIComponent(CLIENT.email)+"&order=date_rdv.desc&limit=50");
    var data2=await r2.json();
    if(Array.isArray(data2)){data2.forEach(function(d){d.salon_nom=d.salons?d.salons.nom:"";var ex=false;CLIENT_RDVS.forEach(function(x){if(x.id===d.id)ex=true;});if(!ex)CLIENT_RDVS.push(d);});}
    render();
  }catch(e){}
}

function downloadReceipt(rdvId){
  var rdv=CLIENT_RDVS.find(function(r){return r.id===rdvId;});if(!rdv)return;
  var txTVA=20;
  var ttc=rdv.service_prix||0;
  var ht=Math.round(ttc*100/(100+txTVA)*100)/100;
  var tva=Math.round((ttc-ht)*100)/100;
  var dp=rdv.date_rdv?rdv.date_rdv.split("-"):["2026","01","01"];
  var dateFR=dp[2]+"/"+dp[1]+"/"+dp[0];
  
  var w=window.open("","_blank","width=380,height=600");if(!w)return;
  var h="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Re\u00e7u</title>";
  h+="<style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace;color:#000}";
  h+="body{padding:20px;max-width:340px;margin:0 auto;font-size:12px;background:#fff}";
  h+="h1{font-size:16px;text-align:center;margin-bottom:2px}";

  h+="p{margin:2px 0;text-align:center}";

  // Header
  h+="<h1>"+(rdv.salon_nom||"Salon").toUpperCase()+"</h1>";
  h+="<div class='sep2'></div>";
  h+="<p class='bold'>RE\u00c7U DE PRESTATION</p>";
  h+="<p>Date : "+dateFR+"</p>";
  h+="<p>Heure : "+(rdv.heure_rdv?rdv.heure_rdv.slice(0,5):"")+"</p>";
  h+="<div class='sep'></div>";
  
  // Client
  h+="<p style='text-align:left;font-weight:700'>Client : "+(CLIENT.prenom||"")+" "+(CLIENT.nom||"")+"</p>";
  if(rdv.collaborateur_nom)h+="<p style='text-align:left'>Collaborateur : "+rdv.collaborateur_nom+"</p>";
  h+="<div class='sep'></div>";
  
  // Prestation
  h+="<div class='line'><span>"+rdv.service_nom+"</span><span>"+ttc.toFixed(2)+" \u20ac</span></div>";
  h+="<div class='sep2'></div>";
  h+="<div class='line bold'><span>TOTAL TTC</span><span>"+ttc.toFixed(2)+" \u20ac</span></div>";
  h+="<div class='line' style='font-size:11px'><span>HT</span><span>"+ht.toFixed(2)+" \u20ac</span></div>";
  h+="<div class='line' style='font-size:11px'><span>TVA "+txTVA+"%</span><span>"+tva.toFixed(2)+" \u20ac</span></div>";
  
  if(rdv.acompte_montant>0){
    h+="<div class='sep'></div>";
    h+="<div class='line' style='font-size:11px'><span>Acompte vers\u00e9</span><span>"+rdv.acompte_montant.toFixed(2)+" \u20ac</span></div>";
    h+="<div class='line bold'><span>RESTE D\u00db</span><span>"+(ttc-rdv.acompte_montant).toFixed(2)+" \u20ac</span></div>";
  }
  
  h+="<div class='sep'></div>";
  h+="<p>Merci de votre visite !</p>";
  h+="<p style='font-size:10px;color:#999;margin-top:8px'>BeautyPro \u2022 "+dateFR+"</p>";
  h+="</body></html>";
  
  w.document.write(h);w.document.close();
  setTimeout(function(){w.print();},300);
}

function closePopup(id){var el=document.getElementById(id);if(el)el.remove();}
function showToast(msg){
  var el=document.createElement("div");
  el.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:300;border:1px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.4)";
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// ========== UTILS ==========
function showErr(id,msg){var el=document.getElementById(id);if(el){el.style.display="block";el.textContent=msg;}}
function showMsg(id,msg,color){var el=document.getElementById(id);if(el){el.style.display="block";el.style.color=color||"var(--text)";el.textContent=msg;}}

// Init
if(window.location.hash==="#register"&&!CLIENT)PAGE="register";
render();
if(CLIENT)loadMyRdvs();
</script>
