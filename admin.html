<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CoiffPro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2035;--bg4:#1f2a42;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --gold:#d4a843;--gold-bg:rgba(212,168,67,.12);--gold2:#b8960f;
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);
  --green:#4ade80;--green-bg:rgba(74,222,128,.1);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,.1);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.1);
  --r:12px;--r2:16px;
  --sh:0 2px 8px rgba(0,0,0,.2);--sh2:0 8px 30px rgba(0,0,0,.3);
  --f1:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--f1);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s;}
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.sb-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:900;}
.sb-logo-text{font-weight:800;font-size:18px;}.sb-logo-text span{color:var(--gold);}
.sb-logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:var(--gold-bg);color:var(--gold);font-weight:700;}
.sb-item .icon{width:20px;text-align:center;font-size:16px;}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;font-family:var(--mono);}
.sb-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:16px 12px 6px;margin-top:4px;}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
.sb-footer div{margin-bottom:2px;}

/* MAIN */
.main{margin-left:240px;padding:24px;min-height:100vh;transition:margin .3s;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.topbar h1{font-size:24px;font-weight:800;}
.topbar h1 span{color:var(--text3);font-weight:400;font-size:16px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.tb-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--f1);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.tb-btn:hover{background:var(--bg3);border-color:var(--border2);}
.tb-btn.primary{background:var(--gold);color:#000;border-color:var(--gold);}
.tb-btn.primary:hover{background:var(--gold2);}

/* CARDS KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden;}
.kpi-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.kpi-value{font-size:28px;font-weight:900;line-height:1.1;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px;}
.kpi-trend{font-weight:700;font-size:11px;padding:2px 6px;border-radius:6px;font-family:var(--mono);}
.kpi-trend.up{background:var(--green-bg);color:var(--green);}
.kpi-trend.down{background:var(--red-bg);color:var(--red);}
.kpi-icon{position:absolute;top:14px;right:14px;font-size:28px;opacity:.15;}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:24px;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.table-title{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
.table-filter{display:flex;gap:6px;}
.tf-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f1);transition:all .15s;}
.tf-btn:hover,.tf-btn.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(212,168,67,.3);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 18px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--bg3);}
td{padding:12px 18px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.td-salon{display:flex;align-items:center;gap:10px;}
.td-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.td-name{font-weight:700;font-size:13px;line-height:1.2;}
.td-city{font-size:11px;color:var(--text3);}
.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;font-family:var(--mono);}
.badge-active{background:var(--green-bg);color:var(--green);}
.badge-trial{background:var(--blue-bg);color:var(--blue);}
.badge-past-due{background:var(--orange-bg);color:var(--orange);}
.badge-suspended{background:var(--red-bg);color:var(--red);}
.badge-cancelled{background:rgba(100,116,139,.15);color:var(--text3);}
.badge-essential{background:var(--blue-bg);color:var(--blue);}
.badge-pro{background:var(--gold-bg);color:var(--gold);}
.badge-premium{background:var(--purple-bg);color:var(--purple);}
.td-actions{display:flex;gap:4px;}
.td-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.td-btn:hover{background:var(--bg4);color:var(--text);}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:16px;max-width:400px;}
.search-box input{background:transparent;border:none;color:var(--text);font-family:var(--f1);font-size:14px;outline:none;flex:1;}
.search-box input::placeholder{color:var(--text3);}

/* DETAIL PANEL */
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px);}
.detail-overlay.open{display:flex;justify-content:flex-end;}
.detail-panel{width:480px;max-width:100%;height:100vh;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:24px;animation:slideIn .25s ease;}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.dp-close{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.dp-close:hover{background:var(--bg4);}
.dp-section{margin-bottom:20px;}
.dp-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.dp-field{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);}
.dp-field .k{color:var(--text2);}
.dp-field .v{font-weight:600;}
.dp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.dp-stat{background:var(--bg3);border-radius:10px;padding:12px;text-align:center;}
.dp-stat .n{font-size:22px;font-weight:900;}
.dp-stat .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.dp-actions{display:flex;flex-direction:column;gap:6px;}
.dp-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--f1);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;}
.dp-btn:hover{background:var(--bg4);}
.dp-btn.danger{border-color:rgba(248,113,113,.3);color:var(--red);}
.dp-btn.danger:hover{background:var(--red-bg);}
.dp-btn.success{border-color:rgba(74,222,128,.3);color:var(--green);}
.dp-btn.success:hover{background:var(--green-bg);}

/* ALERTS */
.alerts-list{display:flex;flex-direction:column;gap:8px;}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;}
.alert-item:hover{background:var(--bg3);}
.alert-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.alert-content{flex:1;}
.alert-title{font-weight:700;font-size:13px;margin-bottom:2px;}
.alert-desc{font-size:12px;color:var(--text3);line-height:1.4;}
.alert-time{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px;}
.alert-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:6px;}

/* CHARTS */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:16px;}
.chart-title{font-weight:800;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;}
.chart-bar-label{width:80px;text-align:right;color:var(--text2);font-weight:500;}
.chart-bar-track{flex:1;height:24px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative;}
.chart-bar-fill{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);}
.chart-bar-val{margin-left:8px;font-weight:700;font-family:var(--mono);min-width:40px;}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;}
.settings-card h3{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sf-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.sf-row:last-child{border-bottom:none;}
.sf-label{font-size:13px;font-weight:500;}
.sf-desc{font-size:11px;color:var(--text3);}
.sf-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-family:var(--f1);font-size:13px;outline:none;width:200px;text-align:right;}
.sf-input:focus{border-color:var(--gold);}

/* MOBILE */
.burger{display:none;position:fixed;top:12px;left:12px;z-index:150;width:40px;height:40px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:20px;align-items:center;justify-content:center;color:var(--text);}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:16px;padding-top:60px;}
  .burger{display:flex;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .detail-panel{width:100%;}
  table{font-size:12px;}
  th,td{padding:8px 10px;}
}
</style>
</head>
<body>

<!-- BURGER MOBILE -->
<button class="burger" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">C</div>
    <div>
      <div class="sb-logo-text"><span>Coiff</span>Pro</div>
      <div class="sb-logo-sub">ADMIN PANEL</div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-item active" onclick="nav('dashboard')"><span class="icon">📊</span>Dashboard</div>
    <div class="sb-item" onclick="nav('salons')"><span class="icon">💇</span>Salons<span class="sb-badge" id="badgeSalons"></span></div>
    <div class="sb-item" onclick="nav('alerts')"><span class="icon">🔔</span>Alertes<span class="sb-badge" id="badgeAlerts"></span></div>
    <div class="sb-section">Finances</div>
    <div class="sb-item" onclick="nav('revenue')"><span class="icon">💰</span>Revenus</div>
    <div class="sb-item" onclick="nav('stripe')"><span class="icon">💳</span>Stripe</div>
    <div class="sb-section">Système</div>
    <div class="sb-item" onclick="nav('settings')"><span class="icon">⚙️</span>Paramètres</div>
    <div class="sb-item" onclick="nav('nf525')"><span class="icon">🛡️</span>NF525 / RGPD</div>
  </div>
  <div class="sb-footer">
    <div><strong>CoiffPro Admin</strong> v2.0</div>
    <div style="font-family:var(--mono)">Alexandre J. — 2026</div>
    <div style="margin-top:6px"><span id="onlineStatus" style="font-size:10px"></span></div>
    <button onclick="doAdminLogout()" style="margin-top:8px;width:100%;padding:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--f1)">🚪 Déconnexion</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent"></div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()">
  <div class="detail-panel" id="detailPanel" onclick="event.stopPropagation()"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== SUPABASE CONFIG =====
var ADMIN_SUPABASE_URL = "https://XXXXXXXX.supabase.co";  // ← À REMPLACER
var ADMIN_SUPABASE_KEY = "eyJhbGciOiJI...";                // ← À REMPLACER
var _adminSb = null;
var _adminIsOnline = false;
var _adminUserId = null;

// Init Supabase
try {
  if (typeof supabase !== "undefined" && ADMIN_SUPABASE_URL.indexOf("XXXX") === -1) {
    _adminSb = supabase.createClient(ADMIN_SUPABASE_URL, ADMIN_SUPABASE_KEY);
  }
} catch(e) { console.log("Supabase non configuré, mode démo"); }

// ===== ADMIN AUTH =====
function showAdminLogin() {
  var el = document.getElementById("mainContent");
  document.querySelector(".sidebar").style.display = "none";
  document.querySelector(".burger").style.display = "none";
  var h = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">';
  h += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:380px;width:100%">';
  h += '<div style="text-align:center;margin-bottom:24px"><div style="font-size:32px;font-weight:900"><span style="color:var(--gold)">Coiff</span>Pro</div>';
  h += '<div style="font-size:12px;color:var(--text3);font-family:var(--mono);letter-spacing:2px">ADMIN PANEL</div></div>';
  h += '<div id="adminLoginError" style="display:none;background:var(--red-bg);color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px"></div>';
  h += '<div style="margin-bottom:12px"><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Email admin</label>';
  h += '<input id="adminEmail" type="email" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;outline:none" placeholder="contact@coiffpro.fr"></div>';
  h += '<div style="margin-bottom:20px"><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Mot de passe</label>';
  h += '<input id="adminPass" type="password" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;outline:none" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doAdminLogin()"></div>';
  h += '<button onclick="doAdminLogin()" style="width:100%;padding:12px;border-radius:10px;background:var(--gold);color:#000;font-weight:700;font-size:15px;border:none;cursor:pointer">Se connecter</button>';
  h += '<div style="text-align:center;margin-top:16px;font-size:11px;color:var(--text3)">Accès réservé à l\'éditeur CoiffPro</div>';
  h += '</div></div>';
  el.innerHTML = h;
}

async function doAdminLogin() {
  if (!_adminSb) { showAdminLoginError("Supabase non configuré"); return; }
  var email = document.getElementById("adminEmail").value.trim();
  var pass = document.getElementById("adminPass").value;
  if (!email || !pass) { showAdminLoginError("Remplissez email et mot de passe"); return; }

  var result = await _adminSb.auth.signInWithPassword({ email: email, password: pass });
  if (result.error) { showAdminLoginError(result.error.message); return; }

  _adminUserId = result.data.user.id;

  // Vérifier que c'est bien un admin
  var adminCheck = await _adminSb.from("admin_users").select("*").eq("user_id", _adminUserId).single();
  if (adminCheck.error || !adminCheck.data) {
    showAdminLoginError("Ce compte n'est pas administrateur.");
    await _adminSb.auth.signOut();
    return;
  }

  _adminIsOnline = true;
  await loadAdminData();
}

function showAdminLoginError(msg) {
  var el = document.getElementById("adminLoginError");
  if (el) { el.style.display = "block"; el.textContent = msg; }
}

async function doAdminLogout() {
  if (_adminSb) await _adminSb.auth.signOut();
  _adminIsOnline = false;
  _adminUserId = null;
  showAdminLogin();
}

// ===== LOAD ADMIN DATA FROM SUPABASE =====
async function loadAdminData() {
  if (!_adminSb) return;

  // Charger les salons via la vue admin
  var res = await _adminSb.from("admin_salon_stats").select("*");
  if (res.data && res.data.length > 0) {
    SALONS = res.data.map(function(s) {
      // Couleur aléatoire basée sur l'id
      var colors = ["#c9a227","#7d3c98","#2d8cf0","#e67e22","#e74c3c","#1abc9c","#9b59b6","#34495e"];
      var hash = 0; for (var i = 0; i < (s.salon_id||"").length; i++) hash = (s.salon_id||"").charCodeAt(i) + ((hash << 5) - hash);
      var color = colors[Math.abs(hash) % colors.length];

      return {
        id: s.salon_id,
        nom: s.nom || "Sans nom",
        ville: s.ville || "",
        email: s.email || "",
        tel: s.tel || "",
        siret: s.siret || "",
        plan: s.plan || "essential",
        billing: s.billing || "monthly",
        status: s.status || "trial",
        created: s.created_at ? s.created_at.slice(0, 10) : "",
        lastLogin: s.last_activity || s.last_updated ? (s.last_activity || s.last_updated).slice(0, 10) : "",
        trialEnd: s.trial_end ? s.trial_end.slice(0, 10) : null,
        stripeId: s.stripe_customer_id || "",
        clients: Number(s.nb_clients) || 0,
        tickets: Number(s.nb_tickets) || 0,
        ca: Number(s.ca_total) || 0,
        collabs: Number(s.nb_collabs) || 0,
        color: color
      };
    });
  }

  // Générer les alertes dynamiquement
  ALERTS = [];
  var alertId = 1;
  var now = new Date().toISOString().slice(0, 10);
  SALONS.forEach(function(s) {
    // Essai qui expire bientôt
    if (s.status === "trial" && s.trialEnd) {
      var days = daysBetween(now, s.trialEnd);
      if (days <= 14 && days > 0) {
        ALERTS.push({ id: alertId++, type: "trial_expiring", salon: s.id,
          title: "Essai expire dans " + days + " jours",
          desc: s.nom + " (" + s.ville + ") — fin le " + fmt(s.trialEnd),
          time: "Automatique", read: false, icon: "⏰",
          iconBg: "var(--orange-bg)", iconColor: "var(--orange)" });
      }
    }
    // Impayé
    if (s.status === "past_due") {
      ALERTS.push({ id: alertId++, type: "payment_failed", salon: s.id,
        title: "Paiement échoué — " + s.nom,
        desc: s.nom + " (" + s.ville + ") — abonnement impayé",
        time: "Automatique", read: false, icon: "💳",
        iconBg: "var(--red-bg)", iconColor: "var(--red)" });
    }
    // Suspendu
    if (s.status === "suspended") {
      ALERTS.push({ id: alertId++, type: "inactive", salon: s.id,
        title: "Salon suspendu — " + s.nom,
        desc: s.nom + " (" + s.ville + ") — compte suspendu",
        time: "Automatique", read: false, icon: "😴",
        iconBg: "var(--purple-bg)", iconColor: "var(--purple)" });
    }
  });

  // Charger les paramètres
  var settingsRes = await _adminSb.from("settings").select("*");
  if (settingsRes.data) {
    settingsRes.data.forEach(function(row) {
      if (row.key === "plans" && row.value) {
        try {
          var p = typeof row.value === "string" ? JSON.parse(row.value) : row.value;
          PLANS = [
            { id: "essential", nom: p.essential.nom, prix: p.essential.prix, prixAnnuel: p.essential.prixAnnuel, couleur: "var(--blue)", maxCollab: p.essential.maxCollab },
            { id: "pro", nom: p.pro.nom, prix: p.pro.prix, prixAnnuel: p.pro.prixAnnuel, couleur: "var(--gold)", maxCollab: p.pro.maxCollab },
            { id: "premium", nom: p.premium.nom, prix: p.premium.prix, prixAnnuel: p.premium.prixAnnuel, couleur: "var(--purple)", maxCollab: p.premium.maxCollab }
          ];
        } catch(e) {}
      }
    });
  }

  // Afficher le panel
  document.querySelector(".sidebar").style.display = "flex";
  render();
}

// ===== ADMIN ACTIONS (Supabase) =====
async function adminUpdateSalon(salonId, data) {
  if (!_adminSb || !_adminIsOnline) return;
  await _adminSb.from("salons").update(data).eq("id", salonId);
  // Log admin action
  await _adminSb.from("admin_log").insert({
    admin_user_id: (await _adminSb.from("admin_users").select("id").eq("user_id", _adminUserId).single()).data.id,
    salon_id: salonId,
    action: Object.keys(data).join(","),
    details: JSON.stringify(data)
  });
  // Reload
  await loadAdminData();
}

async function adminDeleteSalon(salonId) {
  if (!_adminSb || !_adminIsOnline) return;
  if (!confirm("ATTENTION : Supprimer définitivement ce salon et TOUTES ses données ?")) return;
  if (!confirm("DERNIÈRE CONFIRMATION : Cette action est irréversible.")) return;
  await _adminSb.from("salons").delete().eq("id", salonId);
  closeDetail();
  await loadAdminData();
}

// ===== CHECK SESSION ON LOAD =====
async function checkAdminSession() {
  if (!_adminSb) {
    // Pas de Supabase configuré → bloquer l'accès
    var el = document.getElementById("mainContent");
    document.querySelector(".sidebar").style.display = "none";
    el.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="text-align:center;max-width:400px;padding:32px"><div style="font-size:48px;margin-bottom:16px">🔒</div><h2 style="color:var(--gold);margin-bottom:12px">CoiffPro Admin</h2><p style="color:var(--text2);margin-bottom:8px">Le panel admin nécessite une connexion à Supabase.</p><p style="color:var(--text3);font-size:13px">Configurez ADMIN_SUPABASE_URL et ADMIN_SUPABASE_KEY dans le code source, puis rechargez la page.</p></div></div>';
    return;
  }
  var session = await _adminSb.auth.getSession();
  if (session.data && session.data.session) {
    _adminUserId = session.data.session.user.id;
    var adminCheck = await _adminSb.from("admin_users").select("*").eq("user_id", _adminUserId).single();
    if (adminCheck.data) {
      _adminIsOnline = true;
      await loadAdminData();
      return;
    }
  }
  showAdminLogin();
}

  {id:"essential",nom:"Essentiel",prix:19,prixAnnuel:182,couleur:"var(--blue)",maxCollab:1},
  {id:"pro",nom:"Pro",prix:39,prixAnnuel:374,couleur:"var(--gold)",maxCollab:5},

];

// ===== UTILITIES =====
var currentPage="dashboard";
var currentFilter="all";

function fmt(d){if(!d)return"—";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function fmtMoney(n){return n.toLocaleString("fr-FR")+" €";}
function daysBetween(d1,d2){return Math.round((new Date(d2)-new Date(d1))/(1000*60*60*24));}
function today(){return new Date().toISOString().slice(0,10);}
function getInitials(n){return n.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();}
function getPlan(id){for(var i=0;i<PLANS.length;i++){if(PLANS[i].id===id)return PLANS[i];}return PLANS[0];}
function getSalon(id){for(var i=0;i<SALONS.length;i++){if(SALONS[i].id===id)return SALONS[i];}return null;}

function statusLabel(s){
  var m={"active":"Actif","trial":"Essai","past_due":"Impayé","suspended":"Suspendu","cancelled":"Résilié"};
  return m[s]||s;
}
function statusBadge(s){
  return '<span class="badge badge-'+s+'">'+statusLabel(s)+'</span>';
}
function planBadge(p){
  var plan=getPlan(p);
  var cls=p==="essential"?"badge-essential":p==="pro"?"badge-pro":"badge-premium";
  return '<span class="badge '+cls+'">'+plan.nom+'</span>';
}

function nav(page){

// ===== DASHBOARD =====
function renderDashboard(){
  var active=SALONS.filter(function(s){return s.status==="active";}).length;
  var trials=SALONS.filter(function(s){return s.status==="trial";}).length;
  var pastDue=SALONS.filter(function(s){return s.status==="past_due";}).length;

  SALONS.forEach(function(s){
    if(s.status==="active"||s.status==="past_due"){

      if(s.billing==="annual"){mrr+=Math.round(plan.prixAnnuel/12);}

    }

  var totalClients=0,totalTickets=0,totalCA=0;
  SALONS.forEach(function(s){totalClients+=s.clients;totalTickets+=s.tickets;totalCA+=s.ca;});

  h+='<div class="kpi"><div class="kpi-label">Salons actifs</div><div class="kpi-value" style="color:var(--green)">'+active+'</div><div class="kpi-sub">+'+trials+' en essai, '+pastDue+' impayé'+(suspended?' , '+suspended+' suspendu':'')+'</div><div class="kpi-icon">💇</div></div>';

  h+='<div class="kpi"><div class="kpi-label">Tickets encaissés</div><div class="kpi-value">'+totalTickets.toLocaleString("fr-FR")+'</div><div class="kpi-sub">CA total : '+fmtMoney(totalCA)+'</div><div class="kpi-icon">🧾</div></div>';
  h+='</div>';

  // Recent alerts
  var unread=ALERTS.filter(function(a){return !a.read;});
  if(unread.length>0){
    h+='<div class="chart-card"><div class="chart-title">🔔 Alertes récentes ('+unread.length+')</div>';
    h+='<div class="alerts-list">';
    unread.slice(0,3).forEach(function(a){
      h+='<div class="alert-item" onclick="nav(\'alerts\')">';
      h+='<div class="alert-dot"></div>';
      h+='<div class="alert-icon" style="background:'+a.iconBg+';color:'+a.iconColor+'">'+a.icon+'</div>';
      h+='<div class="alert-content"><div class="alert-title">'+a.title+'</div><div class="alert-desc">'+a.desc+'</div><div class="alert-time">'+a.time+'</div></div></div>';
    });
    h+='</div></div>';
  }

  // Revenue by plan
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  h+='<div class="chart-card"><div class="chart-title">📊 Répartition par plan</div>';
  PLANS.forEach(function(p){
    var count=SALONS.filter(function(s){return s.plan===p.id&&(s.status==="active"||s.status==="trial");}).length;
    var pct=Math.round(count/SALONS.length*100);
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.nom+'</div>';
    h+='<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+p.couleur+'">'+count+'</div></div>';
    h+='<div class="chart-bar-val">'+pct+'%</div></div>';
  });
  h+='</div>';

  h+='<div class="chart-card"><div class="chart-title">📈 Répartition par statut</div>';
  var statuses=[{k:"active",l:"Actif",c:"var(--green)"},{k:"trial",l:"Essai",c:"var(--blue)"},{k:"past_due",l:"Impayé",c:"var(--orange)"},{k:"suspended",l:"Suspendu",c:"var(--red)"}];
  statuses.forEach(function(st){
    var count=SALONS.filter(function(s){return s.status===st.k;}).length;
    var pct=Math.round(count/SALONS.length*100);
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+st.l+'</div>';
    h+='<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+st.c+'">'+count+'</div></div>';

    h+='<td>'+planBadge(s.plan)+'</td>';
    h+='<td>'+statusBadge(s.status)+'</td>';
    h+='<td>'+s.clients+'</td>';
    h+='<td>'+s.tickets.toLocaleString("fr-FR")+'</td>';
    h+='<td style="font-weight:700">'+fmtMoney(s.ca)+'</td>';
    h+='<td style="font-size:12px;color:var(--text3)">'+fmt(s.lastLogin)+'</td>';
    h+='<td><div class="td-actions">';

    h+='<button class="td-btn" onclick="emailSalon(\''+s.id+'\')" title="Email">✉️</button>';
    h+='</div></td>';
    h+='</tr>';
  });
  return h;
}

function setFilter(f){
  currentFilter=f;
  render();
}

function filterSalons(){
  var q=document.getElementById("searchInput").value.toLowerCase();
  var filtered=SALONS.filter(function(s){
    return s.nom.toLowerCase().indexOf(q)>-1||s.ville.toLowerCase().indexOf(q)>-1||s.email.toLowerCase().indexOf(q)>-1;
  });
  var tbody=document.getElementById("salonTableBody");
  if(tbody)tbody.innerHTML=buildSalonRows(filtered,currentFilter);
}

function actionSalon(id,action){
  var s=getSalon(id);if(!s)return;

  // Si connecté à Supabase, utiliser les vraies actions
  if (_adminIsOnline) {
    if(action==="suspend"){ adminUpdateSalon(id, {status:"suspended"}); }
    else if(action==="reactivate"){ adminUpdateSalon(id, {status:"active"}); }
    else if(action==="extend_trial"){
      var d=new Date(s.trialEnd||new Date());d.setDate(d.getDate()+7);
      adminUpdateSalon(id, {trial_end: d.toISOString()});
    }
    else if(action==="change_plan"){ alert("Changement de plan → à connecter via Stripe"); }
    else if(action==="remind"){ alert("Email de relance envoyé à " + s.email + " (à connecter)"); }
    else if(action==="reset_pwd"){
      _adminSb.auth.resetPasswordForEmail(s.email).then(function(){
        alert("Lien de réinitialisation envoyé à " + s.email);
      });
    }
    else if(action==="export_data"){ alert("Export RGPD en cours... (à implémenter)"); }
    else if(action==="delete"){ adminDeleteSalon(id); return; }
    else { alert("Action: " + action); }
    return;
  }

  // Mode démo (fallback)
  var msgs={
    "extend_trial":"Essai de "+s.nom+" prolongé de 7 jours !",
    "change_plan":"Changement de plan pour "+s.nom+" — fonctionnalité Stripe à connecter",
    "remind":"Email de relance envoyé à "+s.email,
    "reactivate":"Salon "+s.nom+" réactivé !",
    "suspend":"Salon "+s.nom+" suspendu.",
    "reset_pwd":"Lien de réinitialisation envoyé à "+s.email,
    "export_data":"Export RGPD de "+s.nom+" en cours de génération...",
    "delete":"⚠️ Suppression de "+s.nom+" — confirmation requise (non implémenté en démo)"
  };
  if(action==="suspend"){s.status="suspended";}
  if(action==="reactivate"){s.status="active";}
  if(action==="extend_trial"&&s.trialEnd){
    var d=new Date(s.trialEnd);d.setDate(d.getDate()+7);s.trialEnd=d.toISOString().slice(0,10);
  }
  alert(msgs[action]||"Action: "+action);
  openDetail(id);
}

function emailSalon(id){
  var s=getSalon(id);if(!s)return;
  window.open("mailto:"+s.email+"?subject=CoiffPro - Votre abonnement","_blank");
}

function generatePassword(){
  var chars="abcdefghjkmnpqrstuvwxyz23456789";
  var pwd="";for(var i=0;i<8;i++)pwd+=chars.charAt(Math.floor(Math.random()*chars.length));
  return pwd;
}

function closeModal(){document.getElementById("detailOverlay").classList.remove("open");}

async function doCreateSalon(){
  var nom=document.getElementById("newSalonNom").value.trim();
  var ville=document.getElementById("newSalonVille").value.trim();
  var email=document.getElementById("newSalonEmail").value.trim();
  var pass=document.getElementById("newSalonPass").value;
  var tel=document.getElementById("newSalonTel").value.trim();
  var plan=document.getElementById("newSalonPlan").value;
  var status=document.getElementById("newSalonStatus").value;

  if(!nom||!email||!pass){
    var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Nom, email et mot de passe sont obligatoires.";}return;
  }
  if(pass.length<6){
    var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Le mot de passe doit faire au moins 6 caractères.";}return;
  }

  if(!_adminSb||!_adminIsOnline){alert("Supabase non connecté");return;}

  // 1. Créer le compte auth
  var authRes=await _adminSb.auth.admin.createUser({email:email,password:pass,email_confirm:true});
  if(authRes.error){
    // Fallback: essayer signup normal si admin API pas dispo
    authRes=await _adminSb.auth.signUp({email:email,password:pass});
    if(authRes.error){
      var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Erreur auth: "+authRes.error.message;}return;
    }
  }
  var newUserId=authRes.data.user.id;

  // 2. Créer le salon
  var trialEnd=status==="trial"?new Date(Date.now()+14*24*60*60*1000).toISOString():null;
  var salonRes=await _adminSb.from("salons").insert({
    user_id:newUserId, nom:nom, ville:ville, email:email, tel:tel,
    plan:plan, status:status, trial_end:trialEnd
  }).select().single();

  if(salonRes.error){
    var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Erreur salon: "+salonRes.error.message;}return;
  }

  var newSalonId=salonRes.data.id;

  // 3. Créer 2 collaborateurs par défaut
  await _adminSb.from("collaborateurs").insert([
    {salon_id:newSalonId,nom:"Coiffeur 1",initiales:"C1",couleur:"#c9a227"},
    {salon_id:newSalonId,nom:"Coiffeur 2",initiales:"C2",couleur:"#7d3c98"}
  ]);

  // 4. Log admin
  await _adminSb.from("admin_log").insert({
    admin_user_id:(await _adminSb.from("admin_users").select("id").eq("user_id",_adminUserId).single()).data.id,
    salon_id:newSalonId,
    action:"CREATE_SALON",
    details:"Salon "+nom+" créé - plan "+plan+" - email "+email
  });

  // 5. Fermer et recharger
  closeModal();
  alert("Salon \""+nom+"\" créé avec succès !\n\nIdentifiants :\nEmail : "+email+"\nMot de passe : "+pass+"\n\nCommuniquez ces identifiants au salon.");
  await loadAdminData();
}

// ===== REVENUE =====
function renderRevenue(){
  var mrrMonthly=0,mrrAnnual=0;
  SALONS.forEach(function(s){
    if(s.status!=="active"&&s.status!=="past_due")return;
    var plan=getPlan(s.plan);
    if(s.billing==="annual"){mrrAnnual+=Math.round(plan.prixAnnuel/12);}
    else{mrrMonthly+=plan.prix;}
  });
  var mrr=mrrMonthly+mrrAnnual;
  var arr=mrr*12;

  var h='<div class="topbar"><h1>Revenus <span>Analyse financière</span></h1></div>';

  h+='<div class="kpi-row">';
  h+='<div class="kpi"><div class="kpi-label">MRR</div><div class="kpi-value" style="color:var(--gold)">'+fmtMoney(mrr)+'</div><div class="kpi-sub">Mensuel : '+fmtMoney(mrrMonthly)+' | Annuel : '+fmtMoney(mrrAnnual)+'</div><div class="kpi-icon">💰</div></div>';
  h+='<div class="kpi"><div class="kpi-label">ARR (projection annuelle)</div><div class="kpi-value" style="color:var(--green)">'+fmtMoney(arr)+'</div><div class="kpi-sub">Basé sur le MRR actuel</div><div class="kpi-icon">📈</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Revenu moyen / salon</div><div class="kpi-value">'+fmtMoney(Math.round(mrr/Math.max(1,SALONS.filter(function(s){return s.status==="active";}).length)))+'</div><div class="kpi-sub">ARPU mensuel</div><div class="kpi-icon">💇</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Commission Stripe estimée</div><div class="kpi-value" style="color:var(--red)">~'+fmtMoney(Math.round(mrr*0.014+SALONS.filter(function(s){return s.status==="active";}).length*0.25))+'</div><div class="kpi-sub">1.4% + 0.25€ par transaction</div><div class="kpi-icon">💳</div></div>';
  h+='</div>';

  // Revenue par plan
  h+='<div class="chart-card"><div class="chart-title">💰 MRR par plan</div>';
  PLANS.forEach(function(p){
    var rev=0;
    SALONS.forEach(function(s){
      if(s.plan!==p.id||s.status==="suspended"||s.status==="cancelled")return;
      if(s.billing==="annual")rev+=Math.round(p.prixAnnuel/12);
      else rev+=p.prix;
    });
    var pct=mrr>0?Math.round(rev/mrr*100):0;
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.nom+' ('+p.prix+'€)</div>';
    h+='<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+p.couleur+'">'+fmtMoney(rev)+'</div></div>';
    h+='<div class="chart-bar-val">'+pct+'%</div></div>';
  });
  h+='</div>';

  // Simulation
  h+='<div class="chart-card"><div class="chart-title">🔮 Simulation de croissance</div>';
  h+='<div style="font-size:13px;color:var(--text2);margin-bottom:12px">Projection si tu ajoutes 5 salons Pro / mois :</div>';
  var projections=[{m:"Mois 3",s:15,rev:15*39},{m:"Mois 6",s:30,rev:30*39},{m:"Mois 12",s:60,rev:60*39},{m:"Mois 24",s:120,rev:120*39}];
  var maxP=projections[projections.length-1].rev;
  projections.forEach(function(p){
    var pct=Math.round(p.rev/maxP*100);
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.m+'</div>';
    h+='<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--gold),var(--green))">'+p.s+' salons → '+fmtMoney(p.rev)+'/mois</div></div></div>';
  });
  h+='</div>';

  return h;
}
